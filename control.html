<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding-bottom: 30px; }
        .card-p { background: #1e293b; border-left: 6px solid #f43f5e; margin-bottom: 12px; padding: 15px; border-radius: 15px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 50; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        input, select { color: white !important; }
    </style>
</head>
<body>

    <header class="bg-rose-700 p-4 sticky top-0 z-40 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-lg uppercase">🍓 Delicias Niza</h1>
            <div class="flex gap-2">
                <button onclick="descargarRespaldo()" class="bg-black/20 p-2 rounded-xl text-[10px] font-bold border border-white/10 italic">💾 CSV</button>
                <button onclick="abrirModCli()" class="bg-white/20 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/10">👤 Clientes</button>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-3">
            <div class="bg-slate-900 p-2 rounded-xl border border-blue-500/50 text-center">
                <p class="text-[8px] font-bold text-blue-300">CAJA INICIAL</p>
                <input type="number" id="base-caja" value="0" oninput="dibujarTodo()" class="bg-transparent text-center w-full font-black text-white text-lg outline-none">
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-green-500/50 text-center">
                <p class="text-[8px] font-bold text-green-300">TOTAL CAJA</p>
                <p id="total-caja" class="text-sm font-black text-white">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-rose-500/50 text-center">
                <p class="text-[8px] font-bold text-rose-300">POR COBRAR</p>
                <p id="total-deuda" class="text-sm font-black text-white">$0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 text-center bg-black/40 p-2 rounded-xl">
            <div><p class="text-[8px] font-bold text-slate-400">VASOS</p><p id="t1" class="text-xs font-black">0</p></div>
            <div><p class="text-[8px] font-bold text-green-400">LISTOS</p><p id="t2" class="text-xs font-black text-green-400">0</p></div>
            <div><p class="text-[8px] font-bold text-rose-400">FALTAN</p><p id="t3" class="text-xs font-black text-rose-400">0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-4 rounded-2xl font-black text-sm tap uppercase mb-6 shadow-lg border-b-4 border-rose-900">+ Nuevo Pedido</button>
        <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Registros del día</h2>
            <input type="date" id="fecha-app" onchange="dibujarTodo()" class="bg-slate-800 text-white p-2 rounded-xl border border-slate-700 outline-none text-xs font-bold">
        </div>
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-ped" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] border border-rose-500/20 shadow-2xl">
            <h2 id="titulo-m-ped" class="text-rose-500 font-black mb-5 text-center uppercase">Pedido</h2>
            <input type="hidden" id="edit-id-p">
            <div class="space-y-4">
                <select id="p-atendio" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold text-yellow-500">
                    <option value="">¿Quién atiende?</option>
                    <option>Nelson</option><option>Jenny</option><option>Juan</option>
                    <option>Elizabeth</option><option>Valeria</option><option>Betty</option>
                </select>
                <select id="p-cli" onchange="ponerPrecio()" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold text-white"></select>
                <div class="grid grid-cols-2 gap-3">
                    <select id="p-v" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold text-white text-center">
                        <option>12oz</option><option>14oz</option><option selected>16oz</option><option>18oz</option>
                    </select>
                    <input type="number" id="p-q" value="1" class="w-full bg-slate-800 p-4 rounded-xl text-center font-black text-white">
                </div>
                <input type="number" id="p-val" placeholder="Precio $" class="w-full bg-slate-800 p-4 rounded-xl text-rose-400 font-black text-xl text-center border border-slate-700">
                <button onclick="guardarP()" id="btn-p-guardar"
