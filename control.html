<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA CONTROL TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding-bottom: 20px; }
        .card-p { background: #1e293b; border-left: 5px solid #f43f5e; margin-bottom: 12px; padding: 15px; border-radius: 15px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="bg-rose-700 p-4 sticky top-0 z-40 shadow-2xl">
        <div class="flex justify-between items-center mb-3 text-white">
            <h1 class="font-black italic text-sm">🍓 NIZA CONTROL TOTAL</h1>
            <button onclick="abrirModCli()" class="bg-white/20 p-2 rounded-lg tap text-[10px] font-bold uppercase">👤 CLIENTES</button>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-black/30 p-2 rounded-xl"><p class="text-[8px] font-bold text-slate-300">TOTAL</p><p id="t1" class="text-lg font-black">0</p></div>
            <div class="bg-black/30 p-2 rounded-xl"><p class="text-[8px] font-bold text-green-300">ENVIADO</p><p id="t2" class="text-lg font-black text-green-400">0</p></div>
            <div class="bg-black/30 p-2 rounded-xl"><p class="text-[8px] font-bold text-rose-300">FALTA</p><p id="t3" class="text-lg font-black text-rose-400">0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-4 rounded-2xl font-black text-sm tap uppercase mb-6 shadow-lg">+ NUEVO PEDIDO</button>
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-[10px] font-black text-slate-500 uppercase">Lista de Hoy</h2>
            <input type="date" id="fecha-app" onchange="dibujarTodo()" class="bg-slate-800 text-white p-2 rounded-lg border border-slate-700 outline-none text-xs">
        </div>
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-ped" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2rem] border border-rose-500/20 text-white">
            <h2 id="titulo-m-ped" class="text-rose-500 font-black mb-5 text-center uppercase">Pedido</h2>
            <input type="hidden" id="edit-id-p">
            <div class="space-y-4">
                <select id="p-cli" onchange="ponerPrecio()" class="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700"></select>
                <div class="grid grid-cols-2 gap-3">
                    <select id="p-v" class="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <option>12oz</option><option>14oz</option><option selected>16oz</option><option>18oz</option>
                    </select>
                    <input type="number" id="p-q" value="1" class="w-full bg-slate-800 p-4 rounded-2xl text-center">
                </div>
                <input type="number" id="p-val" placeholder="Precio $" class="w-full bg-slate-800 p-4 rounded-2xl text-rose-400 font-bold border border-slate-700">
                <button onclick="guardarP()" class="w-full bg-green-600 py-4 rounded-2xl font-black tap shadow-lg">GUARDAR ✅</button>
                <button onclick="cerrar()" class="w-full text-slate-500 text-xs py-2">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="m-cli" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2rem] flex flex-col h-[85vh]">
            <h2 class="text-blue-400 font-black mb-4 uppercase text-center">Gestión Clientes</h2>
            <div class="space-y-2 mb-4 bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <input type="hidden" id="edit-id-c">
                <input type="text" id="c-n" placeholder="Nombre" class="w-full bg-slate-700 p-3 rounded-xl">
                <input type="text" id="c-d" placeholder="Dirección" class="w-full bg-slate-700 p-3 rounded-xl">
                <input type="number" id="c-p" placeholder="Precio $" class="w-full bg-slate-700 p-3 rounded-xl">
                <button id="btn-c" onclick="guardarC()" class="w-full bg-blue-600 py-3 rounded-xl font-black tap">AÑADIR</button>
            </div>
            <div id="l-cli" class="overflow-y-auto flex-1 space-y-2"></div>
            <button onclick="cerrar()" class="mt-4 text-slate-500 text-xs">CERRAR</button>
        </div>
    </div>

    <div id="m-pago" class="modal">
        <div class="bg-slate-900 w-full max-w-xs p-6 rounded-[2rem] border border-green-500/30 text-center">
            <h3 class="text-green-400 font-black mb-6 uppercase">Confirmar Pago</h3>
            <input type="hidden" id="pago-id">
            <div class="space-y-3">
                <button onclick="pagoFin('Efectivo')" class="w-full bg-green-600 p-4 rounded-2xl font-black tap">💰 EFECTIVO</button>
                <button onclick="pagoFin('Transferencia')" class="w-full bg-blue-600 p-4 rounded-2xl font-black tap">📱 NEQUI/TRANSF</button>
                <button onclick="cerrar()" class="w-full bg-slate-800 p-3 rounded-2xl text-slate-400">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let CLIS = [], PEDS = [];

        // Fecha Hoy
        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        // Escucha Firebase
        db.ref('fresas_niza/clientes').on('value', s => {
            CLIS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : [];
            actualizarSelect(); dibujarC();
        });
        db.ref('fresas_niza/pedidos').on('value', s => {
            PEDS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : [];
            dibujarTodo();
        });

        // CLIENTES
        function guardarC(){
            const id=document.getElementById('edit-id-c').value, n=document.getElementById('c-n').value, d=document.getElementById('c-d').value, p=document.getElementById('c-p').value;
            if(n&&p){
                const o={nombre:n,direccion:d||'---',precio:parseInt(p)};
                if(id) db.ref('fresas_niza/clientes/'+id).update(o);
                else db.ref('fresas_niza/clientes').push(o);
                resC();
            }
        }
        function edC(id){
            const c=CLIS.find(x=>x.id==id);
            document.getElementById('edit-id-c').value=c.id; document.getElementById('c-n').value=c.nombre; document.getElementById('c-d').value=c.direccion; document.getElementById('c-p').value=c.precio;
            document.getElementById('btn-c').innerText="ACTUALIZAR";
        }
        function resC(){ document.getElementById('edit-id-c').value=''; document.getElementById('c-n').value=''; document.getElementById('c-d').value=''; document.getElementById('c-p').value=''; document.getElementById('btn-c').innerText="AÑADIR"; }
        function dibujarC(){
            const v=document.getElementById('l-cli'); v.innerHTML='';
            CLIS.forEach(c=>{
                v.innerHTML+=`<div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center"><div onclick="edC('${c.id}')"><p class="font-bold text-sm text-white">${c.nombre}</p></div><div class="flex items-center gap-4"><span class="text-blue-400 font-bold">$${c.precio}</span><button onclick="db.ref('fresas_niza/clientes/${c.id}').remove()" class="text-red-500">✕</button></div></div>`;
            });
        }

        // PEDIDOS
        function ponerPrecio(){ const c=CLIS.find(x=>x.nombre==document.getElementById('p-cli').value); if(c) document.getElementById('p-val').value=c.precio; }
        function guardarP(){
            const id=document.getElementById('edit-id-p').value, cN=document.getElementById('p-cli').value, cO=CLIS.find(x=>x.nombre==cN);
            const o={cliente:cN, vaso:document.getElementById('p-v').value, cant:parseInt(document.getElementById('p-q').value), valU:parseInt(document.getElementById('p-val').value), total:parseInt(document.getElementById('p-q').value)*parseInt(document.getElementById('p-val').value), fecha:document.getElementById('fecha-app').value, direccion:cO?cO.direccion:'---'};
            if(id) db.ref('fresas_niza/pedidos/'+id).update(o);
            else { o.entregado=false; o.pagado=false; o.metodo='---'; db.ref('fresas_niza/pedidos').push(o); }
            cerrar();
        }
        function edP(id){
            const p=PEDS.find(x=>x.id==id);
            document.getElementById('edit-id-p').value=p.id; document.getElementById('p-cli').value=p.cliente; document.getElementById('p-v').value=p.vaso; document.getElementById('p-q').value=p.cant; document.getElementById('p-val').value=p.valU;
            document.getElementById('titulo-m-ped').innerText="EDITAR PEDIDO"; abrirModPed();
        }
        function dibujarTodo(){
            const fS=document.getElementById('fecha-app').value, v=document.getElementById('lista-peds'); v.innerHTML='';
            let t1=0, t2=0;
            const hoyP = PEDS.filter(p=>p.fecha==fS);
            if(hoyP.length==0) v.innerHTML='<p class="text-center text-slate-500 py-10 italic">Nada para esta fecha</p>';
            hoyP.forEach(p=>{
                t1+=p.cant; if(p.entregado) t2+=p.cant;
                v.innerHTML+=`<div class="card-p" style="border-color:${p.pagado?'#22c55e':(p.entregado?'#3b82f6':'#f43f5e')}"><div class="flex justify-between mb-3"><div onclick="edP('${p.id}')"><p class="font-black text-sm uppercase text-white">${p.cliente} ${p.pagado?'✅':''}</p><p class="text-[9px] text-slate-400">📍 ${p.direccion}</p></div><div class="text-right"><p class="font-black text-sm text-white">$${new Intl.NumberFormat('de-DE').format(p.total)}</p><p class="text-[9px] text-slate-500">${p.cant}x ${p.vaso}</p></div></div><div class="flex gap-2"><button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 p-2 rounded-xl text-[10px] font-bold ${p.entregado?'bg-blue-900 text-blue-200':'bg-slate-700'}">${p.entregado?'ENTREGADO':'DESPACHAR'}</button>${!p.pagado?`<button onclick="abPago('${p.id}')" class="bg-green-600 p-2 rounded-xl text-[10px] font-bold">COBRAR</button>`:`<button onclick="confirm('¿Eliminar?')&&db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 p-2 rounded-xl font-bold">✕</button>`}</div></div>`;
            });
            document.getElementById('t1').innerText=t1; document.getElementById('t2').innerText=t2; document.getElementById('t3').innerText=t1-t2;
        }
        function abPago(id){ document.getElementById('pago-id').value=id; document.getElementById('m-pago').style.display='flex'; }
        function pagoFin(m){ db.ref('fresas_niza/pedidos/'+document.getElementById('pago-id').value).update({pagado:true, metodo:m, entregado:true}); cerrar(); }
        function actualizarSelect(){ const s=document.getElementById('p-cli'); s.innerHTML='<option value="">-- CLIENTE --</option>'; CLIS.forEach(c=>{ s.innerHTML+=`<option value="${c.nombre}">${c.nombre}</option>`; }); }
        function abrirModPed(){ document.getElementById('edit-id-p').value=''; document.getElementById('titulo-m-ped').innerText="NUEVO PEDIDO"; document.getElementById('m-ped').style.display='flex'; }
        function abrirModCli(){ resC(); document.getElementById('m-cli').style.display='flex'; }
        function cerrar(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    </script>
</body>
</html>
