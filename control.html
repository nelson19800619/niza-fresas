<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA SISTEMA INTEGRAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding-bottom: 80px; }
        .card-p { background: #1e293b; border-left: 6px solid #f43f5e; margin-bottom: 12px; padding: 15px; border-radius: 15px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 50; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="bg-rose-700 p-4 sticky top-0 z-40 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-lg uppercase">🍓 Delicias Niza</h1>
            <div class="flex gap-2">
                <button onclick="descargarRespaldo()" class="bg-black/20 p-2 rounded-xl text-[10px] font-bold border border-white/10">💾 EXCEL</button>
                <button onclick="abrirModCli()" class="bg-white/20 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/10">👤 Clientes</button>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-3">
            <div class="bg-blue-900/40 p-2 rounded-xl border border-blue-500/30 text-center">
                <p class="text-[8px] font-bold text-blue-300">BASE CAJA</p>
                <input type="number" id="base-caja" onchange="actualizarCuentas()" value="0" class="bg-transparent text-center w-full font-black text-white outline-none">
            </div>
            <div class="bg-green-900/40 p-2 rounded-xl border border-green-500/30 text-center">
                <p class="text-[8px] font-bold text-green-300">TOTAL CAJA</p>
                <p id="total-caja" class="text-sm font-black text-white">$0</p>
            </div>
            <div class="bg-rose-900/40 p-2 rounded-xl border border-rose-500/30 text-center">
                <p class="text-[8px] font-bold text-rose-300">POR COBRAR</p>
                <p id="total-deuda" class="text-sm font-black text-white">$0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 text-center bg-black/30 p-2 rounded-xl border border-white/5">
            <div><p class="text-[8px] font-bold text-slate-300 uppercase">Vasos</p><p id="t1" class="text-xs font-black">0</p></div>
            <div><p class="text-[8px] font-bold text-green-400 uppercase">Enviados</p><p id="t2" class="text-xs font-black text-green-400">0</p></div>
            <div><p class="text-[8px] font-bold text-rose-400 uppercase">Faltan</p><p id="t3" class="text-xs font-black text-rose-400">0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-4 rounded-2xl font-black text-sm tap uppercase mb-6 shadow-lg border-b-4 border-rose-800">+ Nuevo Pedido</button>
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Registros de Fecha</h2>
            <input type="date" id="fecha-app" onchange="dibujarTodo()" class="bg-slate-800 text-white p-2 rounded-xl border border-slate-700 outline-none text-xs font-bold">
        </div>
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-ped" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] border border-rose-500/20 text-white">
            <h2 id="titulo-m-ped" class="text-rose-500 font-black mb-5 text-center uppercase">Pedido</h2>
            <input type="hidden" id="edit-id-p">
            <div class="space-y-3">
                <select id="p-atendio" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-yellow-400">
                    <option value="">¿Quién atiende?</option>
                    <option>Nelson</option><option>Jenny</option><option>Juan</option>
                    <option>Elizabeth</option><option>Valeria</option><option>Betty</option>
                </select>
                <select id="p-cli" onchange="ponerPrecio()" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold"></select>
                <div class="grid grid-cols-2 gap-3">
                    <select id="p-v" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold">
                        <option>12oz</option><option>14oz</option><option selected>16oz</option><option>18oz</option>
                    </select>
                    <input type="number" id="p-q" value="1" class="w-full bg-slate-800 p-4 rounded-xl text-center font-black">
                </div>
                <input type="number" id="p-val" placeholder="Precio $" class="w-full bg-slate-800 p-4 rounded-xl text-rose-400 font-black text-center">
                <button id="btn-p-guardar" onclick="guardarP()" class="w-full bg-green-600 py-4 rounded-xl font-black tap shadow-lg uppercase">Guardar ✅</button>
                <button onclick="cerrar()" class="w-full text-slate-500 text-[10px] font-bold py-2 uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="m-cli" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] flex flex-col h-[85vh]">
            <h2 class="text-blue-400 font-black mb-4 uppercase text-center tracking-widest">Gestión de Clientes</h2>
            <div class="space-y-2 mb-4 bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <input type="hidden" id="edit-id-c">
                <input type="text" id="c-n" placeholder="Nombre" class="w-full bg-slate-700 p-4 rounded-xl font-bold">
                <input type="text" id="c-d" placeholder="Dirección" class="w-full bg-slate-700 p-4 rounded-xl font-bold">
                <input type="number" id="c-p" placeholder="Precio Especial" class="w-full bg-slate-700 p-4 rounded-xl font-bold">
                <button id="btn-c-accion" onclick="guardarC()" class="w-full bg-blue-600 py-4 rounded-xl font-black tap uppercase">Añadir</button>
            </div>
            <div id="l-cli" class="overflow-y-auto flex-1 space-y-2"></div>
            <button onclick="cerrar()" class="mt-4 text-slate-500 text-[10px] font-bold uppercase text-center w-full">Cerrar</button>
        </div>
    </div>

    <div id="m-pago" class="modal">
        <div class="bg-slate-900 w-full max-w-xs p-8 rounded-[3rem] text-center shadow-2xl">
            <h3 class="text-green-400 font-black mb-8 uppercase tracking-widest">Confirmar Pago</h3>
            <input type="hidden" id="pago-id">
            <div class="space-y-4">
                <button onclick="pagoFin('Efectivo')" class="w-full bg-green-600 p-5 rounded-2xl font-black tap text-white">💰 EFECTIVO</button>
                <button onclick="pagoFin('Transferencia')" class="w-full bg-blue-600 p-5 rounded-2xl font-black tap text-white">📱 TRANSFERENCIA</button>
                <button onclick="cerrar()" class="w-full text-slate-500 font-bold mt-4">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let CLIS = [], PEDS = [];
        const fmt = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        db.ref('fresas_niza/clientes').on('value', s => {
            CLIS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : [];
            actualizarSelect(); dibujarC();
        });
        db.ref('fresas_niza/pedidos').on('value', s => {
            PEDS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : [];
            dibujarTodo();
        });

        function guardarC(){
            const id=document.getElementById('edit-id-c').value, n=document.getElementById('c-n').value, d=document.getElementById('c-d').value, p=document.getElementById('c-p').value;
            if(n&&p){
                const o={nombre:n,direccion:d||'---',precio:parseInt(p)};
                if(id) db.ref('fresas_niza/clientes/'+id).update(o);
                else db.ref('fresas_niza/clientes').push(o);
                resC();
            }
        }
        function edC(id){
            const c=CLIS.find(x=>x.id==id);
            document.getElementById('edit-id-c').value=c.id; document.getElementById('c-n').value=c.nombre; document.getElementById('c-d').value=c.direccion; document.getElementById('c-p').value=c.precio;
            document.getElementById('btn-c-accion').innerText="ACTUALIZAR ✍️";
            document.getElementById('btn-c-accion').className = "w-full bg-orange-600 py-4 rounded-xl font-black tap uppercase";
        }
        function resC(){ 
            document.getElementById('edit-id-c').value=''; document.getElementById('c-n').value=''; document.getElementById('c-d').value=''; document.getElementById('c-p').value=''; 
            document.getElementById('btn-c-accion').innerText="Añadir"; document.getElementById('btn-c-accion').className = "w-full bg-blue-600 py-4 rounded-xl font-black tap uppercase";
        }
        function dibujarC(){
            const v=document.getElementById('l-cli'); v.innerHTML='';
            CLIS.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c=>{
                v.innerHTML+=`<div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center mb-2 shadow-md"><div onclick="edC('${c.id}')" class="flex-1"><p class="font-black text-sm text-white">${c.nombre}</p><p class="text-[9px] text-slate-500 font-bold uppercase">${c.direccion}</p></div><div class="flex items-center gap-4"><span class="text-blue-400 font-black">$${fmt(c.precio)}</span><button onclick="confirm('¿Eliminar?')&&db.ref('fresas_niza/clientes/${c.id}').remove()" class="text-red-900 font-black p-2">✕</button></div></div>`;
            });
        }

        function ponerPrecio(){ const c=CLIS.find(x=>x.nombre==document.getElementById('p-cli').value); if(c) document.getElementById('p-val').value=c.precio; }
        
        function guardarP(){
            const id=document.getElementById('edit-id-p').value, cN=document.getElementById('p-cli').value, cO=CLIS.find(x=>x.nombre==cN);
            const o={
                cliente:cN, atendio:document.getElementById('p-atendio').value || 'Sin asignar', 
                vaso:document.getElementById('p-v').value, cant:parseInt(document.getElementById('p-q').value), 
                valU:parseInt(document.getElementById('p-val').value), total:parseInt(document.getElementById('p-q').value)*parseInt(document.getElementById('p-val').value), 
                fecha:document.getElementById('fecha-app').value, direccion:cO?cO.direccion:'---'
            };
            if(id) db.ref('fresas_niza/pedidos/'+id).update(o);
            else { o.entregado=false; o.pagado=false; o.metodo='---'; db.ref('fresas_niza/pedidos').push(o); }
            cerrar();
        }

        function edP(id){
            const p=PEDS.find(x=>x.id==id);
            document.getElementById('edit-id-p').value=p.id; document.getElementById('p-cli').value=p.cliente; document.getElementById('p-atendio').value=p.atendio;
            document.getElementById('p-v').value=p.vaso; document.getElementById('p-q').value=p.cant; document.getElementById('p-val').value=p.valU;
            document.getElementById('titulo-m-ped').innerText="ACTUALIZAR PEDIDO ✍️";
            document.getElementById('btn-p-guardar').innerText = "ACTUALIZAR ✅";
            document.getElementById('btn-p-guardar').className = "w-full bg-orange-600 py-4 rounded-xl font-black tap shadow-lg uppercase";
            abrirModPed();
        }

        function enviarWS(id){
            const p = PEDS.find(x=>x.id==id);
            const msg = `🍓 *DELICIAS NIZA* 🍓%0A¡Hola! Tu pedido está listo:%0A• *Cliente:* ${p.cliente}%0A• *Pedido:* ${p.cant}x ${p.vaso}%0A• *Total:* $${fmt(p.total)}%0A• *Atendido por:* ${p.atendio}%0A📍 *Dirección:* ${p.direccion}%0A¡Gracias por tu compra! ✨`;
            window.open(`https://wa.me/?text=${msg}`);
        }

        function dibujarTodo(){
            const fS=document.getElementById('fecha-app').value, v=document.getElementById('lista-peds'); v.innerHTML='';
            let t1=0, t2=0, caja=0, deuda=0;
            const hoyP = PEDS.filter(p=>p.fecha==fS);
            hoyP.forEach(p=>{
                t1+=p.cant; if(p.entregado) t2+=p.cant;
                if(p.pagado) caja+=p.total; else deuda+=p.total;
                v.innerHTML+=`<div class="card-p" style="border-color:${p.pagado?'#22c55e':(p.entregado?'#3b82f6':'#f43f5e')}">
                    <div class="flex justify-between mb-4">
                        <div onclick="edP('${p.id}')" class="flex-1">
                            <p class="font-black text-base uppercase text-white mb-1">${p.cliente} ${p.pagado?'✅':''}</p>
                            <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest">👤 ${p.atendio}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase">📍 ${p.direccion}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-base text-white">$${fmt(p.total)}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase">${p.cant}x ${p.vaso}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 p-3 rounded-2xl text-[9px] font-black tap ${p.entregado?'bg-blue-900 text-blue-300':'bg-slate-700 text-slate-100 shadow-md'}">${p.entreg
