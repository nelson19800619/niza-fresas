<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>NIZA PRO</title><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script><script src="https://cdn.tailwindcss.com"></script><style>.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;align-items:center;justify-content:center;padding:15px}.card{background:#1e293b;border-left:5px solid #f43f5e;margin-bottom:10px;padding:15px;border-radius:15px}</style></head><body class="bg-slate-900 text-white pb-10"><header class="bg-rose-700 p-4 sticky top-0 z-40 shadow-xl"><div class="flex justify-between mb-3"><h1 class="font-black italic">🍓 NIZA FRESAS PRO</h1><button onclick="abrirC()" class="bg-white/20 p-2 rounded-lg text-xs">👤 CLIENTES</button></div><div class="grid grid-cols-3 gap-2 text-center text-[10px] uppercase font-bold"><div class="bg-black/30 p-2 rounded-xl">Total<p id="t1" class="text-lg">0</p></div><div class="bg-black/30 p-2 rounded-xl">Enviado<p id="t2" class="text-lg text-green-400">0</p></div><div class="bg-black/30 p-2 rounded-xl">Falta<p id="t3" class="text-lg text-rose-400">0</p></div></div></header><main class="p-4"><button onclick="abrirP()" class="w-full bg-rose-600 p-4 rounded-2xl font-black mb-6 shadow-lg uppercase">+ Nuevo Pedido</button><div class="flex justify-between mb-4 text-[10px] uppercase font-bold text-slate-500"><span>Pedidos</span><input type="date" id="f" onchange="dibujar()" class="bg-slate-800 text-white p-1 rounded"></div><div id="lista"></div></main><div id="mP" class="modal"><div class="bg-slate-900 w-full max-w-md p-6 rounded-3xl border border-rose-500/20"><h2 class="text-rose-500 font-black mb-4 text-center">PEDIDO</h2><input type="hidden" id="eID"><select id="pC" onchange="aP()" class="w-full bg-slate-800 p-4 rounded-2xl mb-3"></select><div class="grid grid-cols-2 gap-2 mb-3"><select id="pV" class="bg-slate-800 p-4 rounded-2xl"><option>12oz</option><option>14oz</option><option selected>16oz</option><option>18oz</option></select><input type="number" id="pQ" value="1" class="bg-slate-800 p-4 rounded-2xl text-center"></div><input type="number" id="pU" placeholder="Precio $" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 text-rose-400 font-bold"><button onclick="saveP()" class="w-full bg-green-600 py-4 rounded-2xl font-black">GUARDAR</button><button onclick="closeM()" class="w-full py-3 text-slate-500 text-xs">CERRAR</button></div></div><div id="mK" class="modal"><div class="bg-slate-900 w-full max-w-xs p-6 rounded-3xl text-center"><h3 class="mb-5 font-bold">¿CÓMO PAGÓ?</h3><input type="hidden" id="kID"><button onclick="pago('Efectivo')" class="w-full bg-green-600 p-4 rounded-2xl mb-2">EFECTIVO</button><button onclick="pago('Transferencia')" class="w-full bg-blue-600 p-4 rounded-2xl mb-2">TRANSFERENCIA</button><button onclick="closeM()" class="w-full p-2 text-slate-500">CANCELAR</button></div></div><div id="mC" class="modal"><div class="bg-slate-900 w-full max-w-md p-6 rounded-3xl flex flex-col h-[80vh]"><h2 class="text-blue-400 font-black mb-3">CLIENTES</h2><input type="hidden" id="ecID"><input id="cn" placeholder="Nombre" class="w-full bg-slate-800 p-3 rounded-xl mb-2"><input id="cd" placeholder="Dirección" class="w-full bg-slate-800 p-3 rounded-xl mb-2"><input id="cp" type="number" placeholder="Precio $" class="w-full bg-slate-800 p-3 rounded-xl mb-3"><button onclick="saveC()" class="w-full bg-blue-600 py-3 rounded-xl font-black mb-3">AÑADIR</button><div id="lC" class="overflow-y-auto flex-1 space-y-2 text-xs"></div><button onclick="closeM()" class="mt-3 text-slate-500">CERRAR</button></div></div><script>
const config={apiKey:"AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",authDomain:"delicias--niza.firebaseapp.com",databaseURL:"https://delicias--niza-default-rtdb.firebaseio.com",projectId:"delicias--niza",storageBucket:"delicias--niza.firebasestorage.app"};firebase.initializeApp(config);const db=firebase.database();let clis=[],peds=[];document.getElementById('f').value=new Date().toISOString().split('T')[0];db.ref('fresas_niza/clientes').on('value',s=>{clis=s.val()?Object.entries(s.val()).map(([id,d])=>({id,...d})):[];upSel();dibC()});db.ref('fresas_niza/pedidos').on('value',s=>{peds=s.val()?Object.entries(s.val()).map(([id,d])=>({id,...d})):[];dib()});function saveC(){const id=document.getElementById('ecID').value,n=document.getElementById('cn').value,d=document.getElementById('cd').value,p=document.getElementById('cp').value;if(n&&p){const obj={nombre:n,direccion:d,precio:parseInt(p)};if(id)db.ref('fresas_niza/clientes/'+id).update(obj);else db.ref('fresas_niza/clientes').push(obj);resC()}}function dibC(){const v=document.getElementById('lC');v.innerHTML='';clis.forEach(c=>{v.innerHTML+=`<div class="bg-slate-800 p-2 rounded flex justify-between"><div onclick="edC('${c.id}')"><b>${c.nombre}</b><br>${c.direccion}</div><div>$${c.precio} <button onclick="db.ref('fresas_niza/clientes/${c.id}').remove()">✕</button></div></div>`})}function edC(id){const c=clis.find(x=>x.id==id);document.getElementById('ecID').value=c.id;document.getElementById('cn').value=c.nombre;document.getElementById('cd').value=c.direccion;document.getElementById('cp').value=c.precio}function resC(){document.getElementById('ecID').value='';document.getElementById('cn').value='';document.getElementById('cd').value='';document.getElementById('cp').value=''}function upSel(){const s=document.getElementById('pC');s.innerHTML='<option value="">-- Cliente --</option>';clis.forEach(c=>{s.innerHTML+=`<option value="${c.nombre}">${c.nombre}</option>`})}function aP(){const c=clis.find(x=>x.nombre==document.getElementById('pC').value);if(c)document.getElementById('pU').value=c.precio}function saveP(){const id=document.getElementById('eID').value,cN=document.getElementById('pC').value,cO=clis.find(x=>x.nombre==cN);const obj={cliente:cN,vaso:document.getElementById('pV').value,cant:parseInt(document.getElementById('pQ').value),valU:parseInt(document.getElementById('pU').value),total:parseInt(document.getElementById('pQ').value)*parseInt(document.getElementById('pU').value),fecha:document.getElementById('f').value,direccion:cO?cO.direccion:'---'};if(id)db.ref('fresas_niza/pedidos/'+id).update(obj);else{obj.entregado=false;obj.pagado=false;obj.metodo='---';db.ref('fresas_niza/pedidos').push(obj)}closeM()}function dib(){const fS=document.getElementById('f').value,v=document.getElementById('lista');v.innerHTML='';let t1=0,t2=0;peds.filter(p=>p.fecha==fS).forEach(p=>{t1+=p.cant;if(p.entregado)t2+=p.cant;v.innerHTML+=`<div class="card" style="border-color:${p.pagado?'#22c55e':(p.entregado?'#3b82f6':'#f43f5e')}"><div class="flex justify-between mb-2"><div onclick="edP('${p.id}')"><b>${p.cliente} ${p.pagado?'✅':''}</b><br><small>📍 ${p.direccion}</small></div><div class="text-right"><b>$${p.total}</b><br><small>${p.cant}x ${p.vaso}</small></div></div><div class="flex gap-2"><button onclick="tE('${p.id}',${p.entregado})" class="flex-1 p-2 rounded text-[10px] font-bold ${p.entregado?'bg-blue-900':'bg-slate-700'}">${p.entregado?'ENTREGADO':'DESPACHAR'}</button>${!p.pagado?`<button onclick="abK('${p.id}')" class="bg-green-600 p-2 rounded text-[10px] font-bold">COBRAR</button>`:`<button onclick="db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 p-2 rounded">✕</button>`}</div></div>`});document.getElementById('t1').innerText=t1;document.getElementById('t2').innerText=t2;document.getElementById('t3').innerText=t1-t2}function edP(id){const p=peds.find(x=>x.id==id);document.getElementById('eID').value=p.id;document.getElementById('pC').value=p.cliente;document.getElementById('pV').value=p.vaso;document.getElementById('pQ').value=p.cant;document.getElementById('pU').value=p.valU;abrirP()}function abK(id){document.getElementById('kID').value=id;document.getElementById('mK').style.display='flex'}function pago(m){db.ref('fresas_niza/pedidos/'+document.getElementById('kID').value).update({pagado:true,metodo:m,entregado:true});closeM()}function tE(id,s){db.ref('fresas_niza/pedidos/'+id).update({entregado:!s})}function abrirP(){document.getElementById('eID').value='';document.getElementById('mP').style.display='flex'}function abrirC(){resC();document.getElementById('mC').style.display='flex'}function closeM(){document.querySelectorAll('.modal').forEach(m=>m.style.display='none')}
</script></body></html>
