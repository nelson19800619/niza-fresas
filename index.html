<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA - REPORTE FINAL V5.2</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 50px; }
        .card-p { background: #1e293b; border-left: 6px solid #334155; margin-bottom: 12px; padding: 15px; border-radius: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        input, select, textarea { color: white !important; background-color: #1e293b !important; outline: none; border: 1px solid #475569 !important; border-radius: 12px !important; }
        th, td { border: 1px solid #475569; padding: 10px; text-align: left; font-size: 9px; }
        th { background: #1e293b; color: #f8fafc; text-transform: uppercase; font-weight: 900; }
        .cli-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-4 sticky top-0 z-40 shadow-2xl rounded-b-[2rem] border-b border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <h1 class="font-black italic text-lg uppercase tracking-tighter text-rose-500">🍓 Delicias Niza</h1>
                <span class="text-[8px] font-bold opacity-60 text-slate-400 uppercase">V5.2 - Reporte de Cantidades Corregido</span>
            </div>
            <div class="flex gap-1">
                <button onclick="abrirModReporte()" class="bg-blue-600 p-2 rounded-xl text-[8px] font-black text-white uppercase tap px-3">📊 REPORTE</button>
                <button onclick="abrirModConfig()" class="bg-slate-700 p-2 rounded-xl text-[8px] font-bold text-yellow-200 uppercase tap">⚙️ Config</button>
                <button onclick="abrirGastos()" class="bg-slate-700 p-2 rounded-xl text-[8px] font-bold text-rose-300 uppercase tap">💸 Gastos</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-900 p-2 rounded-2xl text-center"><p class="text-[7px] font-black text-blue-400 uppercase">Base</p><input type="number" id="base-caja" onchange="guardarBase()" class="bg-transparent text-center w-full font-black text-white text-sm border-none"></div>
            <div class="bg-slate-900 p-2 rounded-2xl text-center text-emerald-400"><p class="text-[7px] font-black uppercase">Ventas</p><p id="total-ventas" class="text-sm font-black">$0</p></div>
            <div class="bg-slate-900 p-2 rounded-2xl text-center text-indigo-400"><p class="text-[7px] font-black uppercase">En Caja</p><p id="total-caja" class="text-sm font-black">$0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-5 rounded-3xl font-black text-base tap uppercase mb-6 shadow-lg border-b-4 border-rose-900 text-white tracking-widest">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="w-full bg-slate-800 p-3 rounded-xl text-xs font-bold border-none mb-4">
        <div id="lista-peds" class="space-y-4 mb-10"></div>
    </main>

    <div id="m-reporte" class="modal">
        <div class="bg-slate-900 w-full max-w-7xl p-6 rounded-[2.5rem] h-[90vh] flex flex-col border border-blue-500/30">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-blue-400 font-black uppercase italic text-sm">Auditoría de Ventas</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-[10px] font-black px-4 py-2 rounded-xl uppercase tap">📥 Excel</button>
            </div>
            <input type="text" id="bus-rep" oninput="dibujarTodo()" placeholder="🔍 Buscar pedido..." class="bg-slate-800 p-3 rounded-xl text-xs w-full mb-4">
            <div class="overflow-auto flex-1 rounded-2xl border border-slate-700 bg-slate-800/20">
                <table id="tabla-reporte" class="w-full text-white min-w-[1200px]">
                    <thead>
                        <tr>
                            <th>CLIENTE</th>
                            <th>ENTREGA</th>
                            <th>ESTADO</th>
                            <th>CANT</th>
                            <th>V. VASOS</th>
                            <th>V. TOPPINGS</th>
                            <th>DESC</th>
                            <th>TOTAL</th>
                            <th>METODO</th>
                            <th>ATENDIÓ</th>
                            <th>DETALLES</th>
                        </tr>
                    </thead>
                    <tbody id="body-reporte"></tbody>
                </table>
            </div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 font-black uppercase text-[10px]">Cerrar Reporte</button>
        </div>
    </div>

    <div id="m-config" class="modal">... (código de edición de clientes) ...</div>
    <div id="m-ped" class="modal">... (código de nueva venta) ...</div>

    <script>
        // ... (configuración Firebase y variables igual que V5.1) ...

        function dibujarTodo() {
            const fS = document.getElementById('fecha-app').value;
            const vP = document.getElementById('lista-peds');
            const bR = document.getElementById('body-reporte');
            const vG = document.getElementById('l-gastos');
            const busRep = document.getElementById('bus-rep').value.toLowerCase();
            
            vP.innerHTML = ''; bR.innerHTML = ''; vG.innerHTML = '';
            let vHoy=0, gHoy=0;

            PEDS.filter(p => p.fecha == fS).reverse().forEach(p => {
                if(p.pagado) vHoy += Number(p.total);

                // Dibujar Tarjetas en Inicio
                vP.innerHTML += `<div class="card-p" style="border-left-color:${p.pagado ? '#10b981' : (p.entregado ? '#6366f1' : '#f43f5e')}">
                    <div class="flex justify-between mb-2"><div><p class="font-black text-xs uppercase">${p.cliente}</p><p class="text-[8px] font-bold text-slate-500">${p.entrega} | ${p.atendio}</p></div><p class="font-black text-lg">$${fmt(p.total)}</p></div>
                    <div class="flex gap-2">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 py-3 rounded-xl text-[8px] font-black ${p.entregado?'bg-indigo-900/40 text-indigo-400':'bg-slate-700 text-slate-400'}">${p.entregado?'LISTO':'🚚 DESPACHAR'}</button>
                        ${!p.pagado ? `<button onclick="abPago('${p.id}')" class="bg-emerald-600 px-6 rounded-xl text-[8px] font-black uppercase">Cobrar</button>` : `<button onclick="confirm('¿Borrar?')&&db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 px-4 rounded-xl">✕</button>`}
                    </div>
                </div>`;

                // DIBUJAR TABLA DE REPORTE (Aquí está la corrección)
                if(!busRep || p.cliente.toLowerCase().includes(busRep)) {
                    bR.innerHTML += `<tr>
                        <td class="font-bold">${aNombrePropio(p.cliente)}</td>
                        <td>${p.entrega}</td>
                        <td class="${p.entregado?'text-indigo-400':'text-rose-500'} font-black">${p.entregado?'LISTO':'PEND'}</td>
                        <td class="text-center font-bold">${p.cant || 1}</td>
                        <td data-t="n" class="text-blue-300">$${fmt(p.vVasos || p.subtotal)}</td>
                        <td data-t="n" class="text-yellow-200">$${fmt(p.vTops || 0)}</td>
                        <td data-t="n" class="text-rose-400">$${fmt(p.descuento || 0)}</td>
                        <td data-t="n" class="font-black text-emerald-400">$${fmt(p.total)}</td>
                        <td class="font-bold">${p.pagado ? p.metodo.toUpperCase() : 'DEBE'}</td>
                        <td>${aNombrePropio(p.atendio)}</td>
                        <td class="text-[7px] italic text-slate-400">${p.items ? p.items.map(i => i.vaso).join(' | ') : '-'}</td>
                    </tr>`;
                }
            });

            // Gastos y Totales finales
            GASTOS.filter(g => g.fecha == fS).forEach(g => { gHoy += Number(g.val); vG.innerHTML += `<div class="text-[10px] flex justify-between p-1 bg-slate-800 rounded mb-1 px-2"><span>${g.desc}</span><span class="text-rose-400">-$${fmt(g.val)}</span></div>`; });
            document.getElementById('total-ventas').innerText = '$' + fmt(vHoy);
            document.getElementById('total-caja').innerText = '$' + fmt( (Number(BASES[fS])||0) + vHoy - gHoy );
        }

        // ... (Resto de funciones: guardarP, agregarAlCarrito, exportarExcel, etc. igual que V5.1) ...
    </script>
</body>
</html>
