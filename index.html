<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA SISTEMA PRO V7.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; padding: 15px; overflow-y: auto; }
        input, select { background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 12px !important; color: white !important; }
        .chip-active { background-color: #e11d48 !important; border-color: #fb7185 !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-slate-800 p-4 sticky top-0 z-40 rounded-b-[2rem] shadow-xl">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-rose-500 font-black italic text-lg">NIZA PRO V7</h1>
            <div class="flex gap-1">
                <button onclick="abrir('m-reporte')" class="bg-blue-600 p-2 rounded-lg text-[8px] font-bold">📊 REPORTE</button>
                <button onclick="abrir('m-gastos')" class="bg-rose-600 p-2 rounded-lg text-[8px] font-bold">💸 GASTOS</button>
                <button onclick="abrir('m-config-pro')" class="bg-slate-700 p-2 rounded-lg text-[8px] font-bold text-yellow-400">⚙️ AJUSTES</button>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-slate-900 p-2 rounded-xl">
                <p class="text-[7px] text-blue-400 uppercase">Ventas</p>
                <p id="total-ventas" class="text-xs font-bold">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl">
                <p class="text-[7px] text-emerald-400 uppercase">Caja</p>
                <p id="total-caja" class="text-xs font-bold">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl">
                <p class="text-[7px] text-rose-400 uppercase">Vasos</p>
                <p id="c-total" class="text-xs font-bold">0</p>
            </div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirVenta()" class="w-full bg-rose-600 p-6 rounded-3xl font-black text-lg shadow-lg mb-6 tap">🚀 NUEVA VENTA</button>
        <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="w-full p-3 rounded-xl mb-4 text-center font-bold">
        <div id="lista-peds" class="space-y-3"></div>
    </main>

    <div id="m-venta" class="modal">
        <div class="bg-slate-900 w-full max-w-lg p-6 rounded-[2.5rem] mx-auto shadow-2xl border border-rose-500/20">
            <h2 class="text-rose-500 font-black text-center mb-4">NUEVO PEDIDO</h2>
            
            <div class="space-y-4">
                <label class="text-[10px] text-slate-400 block ml-2">CLIENTE Y QUIÉN ATIENDE</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="v-cli" class="p-3 text-xs"></select>
                    <select id="v-user" class="p-3 text-xs"></select>
                </div>

                <label class="text-[10px] text-slate-400 block ml-2 uppercase">1. Selecciona el Vaso</label>
                <div id="grid-vasos" class="grid grid-cols-2 gap-2"></div>

                <label class="text-[10px] text-slate-400 block ml-2 uppercase">2. Toppings (Selección múltiple)</label>
                <div id="grid-toppings" class="grid grid-cols-2 gap-2"></div>

                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="v-cant" value="1" oninput="calcV()" placeholder="Cant Vasos" class="p-3 text-xs">
                    <input type="number" id="v-desc" value="0" oninput="calcV()" placeholder="Descuento $" class="p-3 text-xs text-rose-400">
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl text-center border-2 border-emerald-500/30">
                    <p id="v-total-txt" class="text-3xl font-black text-emerald-400">$0</p>
                </div>

                <div class="flex gap-2">
                    <button onclick="guardarPedido()" class="flex-1 bg-rose-600 py-4 rounded-xl font-bold uppercase tap">Confirmar Venta</button>
                    <button onclick="cerrar()" class="bg-slate-700 px-6 rounded-xl font-bold tap text-xs">X</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-config-pro" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2rem] mx-auto">
            <h2 class="text-yellow-400 font-black text-center mb-6">MÓDULOS DE CONFIGURACIÓN</h2>
            
            <div class="space-y-4">
                <details class="bg-slate-800 rounded-xl p-3">
                    <summary class="font-bold text-xs">👥 GESTIÓN DE PERSONAL</summary>
                    <div class="pt-3 flex gap-2"><input id="u-n" class="flex-1 p-2 text-xs" placeholder="Nombre"><button onclick="addU()" class="bg-indigo-600 px-4 rounded-lg">+</button></div>
                    <div id="l-u" class="mt-2 space-y-1"></div>
                </details>

                <details class="bg-slate-800 rounded-xl p-3">
                    <summary class="font-bold text-xs">🥤 TIPOS DE VASOS</summary>
                    <div class="pt-3 grid grid-cols-2 gap-2"><input id="vas-n" class="p-2 text-xs" placeholder="Nombre"><input id="vas-p" type="number" class="p-2 text-xs" placeholder="$ Precio"></div>
                    <button onclick="addV()" class="w-full bg-blue-600 mt-2 py-2 rounded-lg text-xs">+</button>
                    <div id="l-v" class="mt-2 space-y-1"></div>
                </details>

                <details class="bg-slate-800 rounded-xl p-3">
                    <summary class="font-bold text-xs">🍫 TOPPINGS</summary>
                    <div class="pt-3 grid grid-cols-2 gap-2"><input id="top-n" class="p-2 text-xs" placeholder="Nombre"><input id="top-p" type="number" class="p-2 text-xs" placeholder="$ Precio"></div>
                    <button onclick="addT()" class="w-full bg-emerald-600 mt-2 py-2 rounded-lg text-xs">+</button>
                    <div id="l-t" class="mt-2 space-y-1"></div>
                </details>

                <details class="bg-slate-800 rounded-xl p-3">
                    <summary class="font-bold text-xs">🏠 CLIENTES</summary>
                    <div class="pt-3 flex gap-2"><input id="cli-n" class="flex-1 p-2 text-xs" placeholder="Nombre"><button onclick="addC()" class="bg-yellow-600 px-4 rounded-lg">+</button></div>
                    <div id="l-c" class="mt-2 space-y-1"></div>
                </details>
            </div>
            
            <button onclick="cerrar()" class="w-full mt-6 text-slate-500 font-bold text-[10px] uppercase">Cerrar Ajustes</button>
        </div>
    </div>

    <div id="m-reporte" class="modal"><div class="bg-slate-900 w-full max-w-4xl p-4 rounded-2xl overflow-x-auto"><table class="w-full text-[9px]"><thead id="th-reporte"></thead><tbody id="tb-reporte"></tbody></table><button onclick="cerrar()" class="mt-4 text-rose-500">CERRAR</button></div></div>
    <div id="m-gastos" class="modal"><div class="bg-slate-900 w-full max-w-md p-6 rounded-2xl"><h2>GASTOS</h2><div id="l-gastos-lista"></div><button onclick="cerrar()">CERRAR</button></div></div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let PEDS=[], CLIS=[], USERS=[], VASOS=[], TOPS=[], GASTOS=[], BASES={};
        let vasoSel = null, topsSel = [];

        // --- CARGA DE DATOS ---
        const fbGet = (path, cb) => db.ref('fresas_niza/'+path).on('value', s => cb(s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []));
        
        fbGet('pedidos', d => { PEDS = d; dibujarTodo(); });
        fbGet('clientes', d => { CLIS = d; dibUIs(); });
        fbGet('personal', d => { USERS = d; dibUIs(); });
        fbGet('config/vasos', d => { VASOS = d; dibUIs(); });
        fbGet('config/toppings', d => { TOPS = d; dibUIs(); });
        fbGet('gastos', d => { GASTOS = d; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; cargarDatosDia(); });

        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        // --- LÓGICA DE VENTA ---
        function abrirVenta() {
            const sCli = document.getElementById('v-cli'), sU = document.getElementById('v-user'), gV = document.getElementById('grid-vasos'), gT = document.getElementById('grid-toppings');
            sCli.innerHTML = '<option value="">Cliente...</option>'; CLIS.forEach(c => sCli.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`);
            sU.innerHTML = '<option value="">Atiende...</option>'; USERS.forEach(u => sU.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            
            gV.innerHTML = ''; VASOS.forEach(v => gV.innerHTML += `<button id="btnV-${v.id}" onclick="selV('${v.id}')" class="bg-slate-800 p-3 rounded-xl text-[10px] border border-slate-700">${v.nombre}<br><b>$${v.precio}</b></button>`);
            gT.innerHTML = ''; TOPS.forEach(t => gT.innerHTML += `<button id="btnT-${t.id}" onclick="selT('${t.id}')" class="bg-slate-800 p-3 rounded-xl text-[10px] border border-slate-700">${t.nombre}<br><b>$${t.precio}</b></button>`);
            
            vasoSel = null; topsSel = []; calcV();
            abrir('m-venta');
        }

        function selV(id) { 
            vasoSel = VASOS.find(v => v.id === id); 
            document.querySelectorAll('[id^="btnV-"]').forEach(b => b.classList.remove('chip-active'));
            document.getElementById('btnV-'+id).classList.add('chip-active');
            calcV(); 
        }

        function selT(id) {
            const index = topsSel.findIndex(t => t.id === id);
            if(index > -1) { topsSel.splice(index, 1); document.getElementById('btnT-'+id).classList.remove('chip-active'); }
            else { topsSel.push(TOPS.find(t => t.id === id)); document.getElementById('btnT-'+id).classList.add('chip-active'); }
            calcV();
        }

        function calcV() {
            let pV = vasoSel ? parseInt(vasoSel.precio) : 0;
            let pT = topsSel.reduce((acc, t) => acc + parseInt(t.precio), 0);
            let cant = parseInt(document.getElementById('v-cant').value) || 1;
            let desc = parseInt(document.getElementById('v-desc').value) || 0;
            let total = ((pV + pT) * cant) - desc;
            document.getElementById('v-total-txt').innerText = '$' + new Intl.NumberFormat('de-DE').format(total);
            return total;
        }

        function guardarPedido() {
            const total = calcV();
            if(!vasoSel || !document.getElementById('v-cli').value) return alert("Faltan datos");
            db.ref('fresas_niza/pedidos').push({
                cliente: document.getElementById('v-cli').value,
                atendio: document.getElementById('v-user').value,
                vaso: vasoSel.nombre,
                precioVaso: vasoSel.precio,
                toppings: topsSel.map(t => t.nombre).join(', '),
                precioTops: topsSel.reduce((acc, t) => acc + parseInt(t.precio), 0),
                cant: document.getElementById('v-cant').value,
                descuento: document.getElementById('v-desc').value,
                total: total,
                fecha: document.getElementById('fecha-app').value,
                pagado: false, entregado: false
            }).then(() => cerrar());
        }

        // --- CRUD CONFIGURACIÓN ---
        function addU() { const n = document.getElementById('u-n').value; if(n) db.ref('fresas_niza/personal').push({nombre:n}); }
        function addV() { const n = document.getElementById('vas-n').value, p = document.getElementById('vas-p').value; if(n && p) db.ref('fresas_niza/config/vasos').push({nombre:n, precio:p}); }
        function addT() { const n = document.getElementById('top-n').value, p = document.getElementById('top-p').value; if(n && p) db.ref('fresas_niza/config/toppings').push({nombre:n, precio:p}); }
        function addC() { const n = document.getElementById('cli-n').value; if(n) db.ref('fresas_niza/clientes').push({nombre:n}); }

        function dibUIs() {
            const lU = document.getElementById('l-u'); lU.innerHTML = ''; USERS.forEach(u => lU.innerHTML += `<div class="flex justify-between bg-slate-900 p-2 rounded text-[10px]"><span>${u.nombre}</span><button onclick="db.ref('fresas_niza/personal/${u.id}').remove()">✕</button></div>`);
            const lV = document.getElementById('l-v'); lV.innerHTML = ''; VASOS.forEach(v => lV.innerHTML += `<div class="flex justify-between bg-slate-900 p-2 rounded text-[10px]"><span>${v.nombre} ($${v.precio})</span><button onclick="db.ref('fresas_niza/config/vasos/${v.id}').remove()">✕</button></div>`);
            const lT = document.getElementById('l-t'); lT.innerHTML = ''; TOPS.forEach(t => lT.innerHTML += `<div class="flex justify-between bg-slate-900 p-2 rounded text-[10px]"><span>${t.nombre} ($${t.precio})</span><button onclick="db.ref('fresas_niza/config/toppings/${t.id}').remove()">✕</button></div>`);
            const lC = document.getElementById('l-c'); lC.innerHTML = ''; CLIS.forEach(c => lC.innerHTML += `<div class="flex justify-between bg-slate-900 p-2 rounded text-[10px]"><span>${c.nombre}</span><button onclick="db.ref('fresas_niza/clientes/${c.id}').remove()">✕</button></div>`);
        }

        // --- DASHBOARD ---
        function dibujarTodo() {
            const f = document.getElementById('fecha-app').value, vP = document.getElementById('lista-peds');
            vP.innerHTML = ''; let vTotal=0, cVasos=0;
            PEDS.filter(p => p.fecha == f).reverse().forEach(p => {
                if(p.pagado) vTotal += parseInt(p.total);
                cVasos += parseInt(p.cant);
                vP.innerHTML += `<div class="bg-slate-800 p-4 rounded-3xl border-l-8 ${p.pagado?'border-emerald-500':'border-rose-500'}">
                    <div class="flex justify-between"><b>${p.cliente}</b><b class="text-emerald-400">$${p.total}</b></div>
                    <p class="text-[10px] text-slate-500">${p.cant}x ${p.vaso} + ${p.toppings}</p>
                    <div class="flex gap-2 mt-3">
                        ${!p.pagado ? `<button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({pagado:true})" class="flex-1 bg-emerald-600 rounded-xl text-[10px] py-2 font-bold">COBRAR</button>` : `<button onclick="db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-700 px-4 rounded-xl">✕</button>`}
                    </div>
                </div>`;
            });
            document.getElementById('total-ventas').innerText = '$' + new Intl.NumberFormat('de-DE').format(vTotal);
            document.getElementById('c-total').innerText = cVasos;
        }

        function abrir(id) { document.getElementById(id).style.display = 'block'; }
        function cerrar() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function cargarDatosDia() { dibujarTodo(); }
    </script>
</body>
</html>
