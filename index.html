<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA - EDICIÓN HABILITADA V5.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 50px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        input, select { color: white !important; background-color: #1e293b !important; outline: none; border: 1px solid #475569 !important; border-radius: 12px !important; }
        .cli-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-4 sticky top-0 z-40 shadow-2xl rounded-b-[2rem] border-b border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <h1 class="font-black italic text-lg uppercase tracking-tighter text-rose-500">🍓 Delicias Niza</h1>
                <span class="text-[8px] font-bold opacity-60 text-slate-400 uppercase">V5.0 - Edición de Clientes Activa</span>
            </div>
            <div class="flex gap-1">
                <button onclick="abrirModReporte()" class="bg-blue-600 p-2 rounded-xl text-[8px] font-black text-white uppercase tap px-3">📊 REPORTE</button>
                <button onclick="abrirModConfig()" class="bg-slate-700 p-2 rounded-xl text-[8px] font-bold text-yellow-200 uppercase">⚙️ Config</button>
            </div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-5 rounded-3xl font-black text-base tap uppercase mb-6 shadow-lg border-b-4 border-rose-900 text-white tracking-widest">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="w-full bg-slate-800 p-3 rounded-xl text-xs font-bold border-none mb-4">
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-config" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] h-[90vh] flex flex-col border border-yellow-500/30">
            <h2 id="titulo-config-cli" class="text-yellow-500 font-black mb-4 uppercase text-center text-sm italic">Registrar Cliente</h2>
            
            <input type="hidden" id="edit-id-cli">
            <div class="bg-slate-800/50 p-4 rounded-3xl border border-slate-700 mb-6">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="c-n" placeholder="Nombre" class="p-2 text-[10px] uppercase">
                    <input type="number" id="c-t" placeholder="Teléfono" class="p-2 text-[10px]">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="text" id="c-b" placeholder="Barrio" class="p-2 text-[10px] uppercase">
                    <input type="text" id="c-d" placeholder="Dirección" class="p-2 text-[10px] uppercase">
                </div>
                <div class="flex gap-2">
                    <button id="btn-guardar-cli" onclick="guardarC()" class="flex-1 bg-blue-600 p-3 rounded-xl font-black text-[10px] uppercase">Guardar Cliente</button>
                    <button id="btn-cancelar-edit" onclick="limpiarFormCli()" class="hidden bg-slate-700 px-4 rounded-xl font-black text-[10px] uppercase">✕</button>
                </div>
            </div>

            <p class="text-[9px] font-black text-slate-500 mb-2 uppercase">Lista de Clientes (Click en ✏️ para editar):</p>
            <div id="l-cli" class="overflow-y-auto flex-1 space-y-1 pr-2"></div>
            
            <button onclick="cerrar()" class="mt-4 bg-slate-800 py-3 rounded-2xl text-slate-400 font-bold uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-reporte" class="modal">...</div>
    <div id="m-ped" class="modal">...</div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let CLIS = [], PEDS = [], USERS = [], CARRITO = [];

        db.ref('fresas_niza/clientes').on('value', s => { 
            CLIS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; 
            dibujarConfigCLI(); 
        });

        // --- FUNCIONES DE EDICIÓN ---
        
        function prepararEdicion(id) {
            const c = CLIS.find(item => item.id === id);
            if(!c) return;

            // Llenar campos
            document.getElementById('edit-id-cli').value = c.id;
            document.getElementById('c-n').value = c.nombre;
            document.getElementById('c-t').value = c.tel || '';
            document.getElementById('c-b').value = c.barrio || '';
            document.getElementById('c-d').value = c.dir || '';

            // Cambiar UI
            document.getElementById('titulo-config-cli').innerText = "Editando Cliente";
            document.getElementById('btn-guardar-cli').innerText = "Actualizar Datos";
            document.getElementById('btn-guardar-cli').classList.replace('bg-blue-600', 'bg-emerald-600');
            document.getElementById('btn-cancelar-edit').classList.remove('hidden');
        }

        function limpiarFormCli() {
            document.getElementById('edit-id-cli').value = '';
            document.getElementById('c-n').value = '';
            document.getElementById('c-t').value = '';
            document.getElementById('c-b').value = '';
            document.getElementById('c-d').value = '';
            
            document.getElementById('titulo-config-cli').innerText = "Registrar Cliente";
            document.getElementById('btn-guardar-cli').innerText = "Guardar Cliente";
            document.getElementById('btn-guardar-cli').classList.replace('bg-emerald-600', 'bg-blue-600');
            document.getElementById('btn-cancelar-edit').classList.add('hidden');
        }

        function guardarC(){
            const id = document.getElementById('edit-id-cli').value;
            const n = document.getElementById('c-n').value.toUpperCase();
            const t = document.getElementById('c-t').value;
            const b = document.getElementById('c-b').value.toUpperCase();
            const d = document.getElementById('c-d').value.toUpperCase();

            if(!n) return alert("Nombre obligatorio");

            const datos = { nombre: n, tel: t, barrio: b, dir: d };

            if(id) {
                // ACTUALIZAR
                db.ref('fresas_niza/clientes/' + id).update(datos).then(() => {
                    limpiarFormCli();
                });
            } else {
                // CREAR NUEVO
                db.ref('fresas_niza/clientes').push(datos).then(() => {
                    limpiarFormCli();
                });
            }
        }

        function dibujarConfigCLI() {
            const l = document.getElementById('l-cli'); l.innerHTML = '';
            CLIS.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                l.innerHTML += `
                <div class="cli-item flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="font-black text-[10px] text-white uppercase">${c.nombre}</span>
                        <span class="text-[8px] text-slate-400">${c.tel || ''} | ${c.barrio || ''}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="prepararEdicion('${c.id}')" class="bg-slate-700 p-2 rounded-lg text-yellow-400">✏️</button>
                        <button onclick="confirm('¿Borrar cliente?') && db.ref('fresas_niza/clientes/${c.id}').remove()" class="bg-slate-700 p-2 rounded-lg text-rose-500">✕</button>
                    </div>
                </div>`;
            });
        }

        // --- EL RESTO DE LA LÓGICA (VENTAS, REPORTE, ETC) SIGUE IGUAL QUE LA V4.9 ---
        function cerrar(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
        function abrirModConfig(){ limpiarFormCli(); document.getElementById('m-config').style.display='flex'; }
        // ... (resto de funciones)
    </script>
</body>
</html>
