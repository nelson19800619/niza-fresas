<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA - PRODUCCIÓN V5.8</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 60px; }
        .card-p { background: #1e293b; border-left: 12px solid #334155; margin-bottom: 15px; padding: 20px; border-radius: 28px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        input, select, textarea { color: white !important; background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 15px !important; }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-5 sticky top-0 z-40 shadow-2xl rounded-b-[3rem] border-b border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-col">
                <h1 class="font-black italic text-2xl uppercase tracking-tighter text-rose-500">🍓 Delicias Niza</h1>
                <span class="text-[10px] font-black opacity-50 text-slate-400 uppercase tracking-[0.2em]">Panel de Producción</span>
            </div>
            <button onclick="abrirModConfig()" class="bg-slate-700 p-3 rounded-2xl text-[10px] font-bold text-yellow-200 uppercase tap">⚙️</button>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="bg-slate-900 p-3 rounded-2xl text-center border border-blue-500/20">
                <p class="text-[8px] font-black text-blue-400 uppercase mb-1">Base</p>
                <input type="number" id="base-caja" oninput="guardarBase()" class="bg-transparent text-center w-full font-black text-white text-base border-none p-0">
            </div>
            <div class="bg-slate-900 p-3 rounded-2xl text-center border border-emerald-500/20">
                <p class="text-[8px] font-black text-emerald-400 uppercase mb-1">Ventas</p>
                <p id="total-ventas" class="text-base font-black">$0</p>
            </div>
            <div class="bg-slate-900 p-3 rounded-2xl text-center border border-indigo-500/20">
                <p class="text-[8px] font-black text-indigo-400 uppercase mb-1">En Caja</p>
                <p id="total-caja" class="text-base font-black">$0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-700/30 p-3 rounded-2xl flex flex-col items-center border border-slate-600/30">
                <span class="text-[8px] font-black text-slate-400 uppercase mb-1">Total Vasos</span>
                <span id="c-total" class="text-2xl font-black text-white">0</span>
            </div>
            <div class="bg-rose-500/20 p-3 rounded-2xl flex flex-col items-center border border-rose-500/40">
                <span class="text-[8px] font-black text-rose-400 uppercase mb-1">Faltan</span>
                <span id="c-pend" class="text-2xl font-black text-rose-500">0</span>
            </div>
            <div class="bg-emerald-500/20 p-3 rounded-2xl flex flex-col items-center border border-emerald-500/40">
                <span class="text-[8px] font-black text-emerald-400 uppercase mb-1">Entregados</span>
                <span id="c-listo" class="text-2xl font-black text-emerald-500">0</span>
            </div>
        </div>
    </header>

    <main class="p-6">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-7 rounded-[2.5rem] font-black text-xl tap uppercase mb-8 shadow-2xl border-b-8 border-rose-900 text-white tracking-widest">🚀 NUEVA VENTA</button>
        
        <div class="flex gap-3 items-center mb-6">
            <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="flex-1 bg-slate-800 p-4 rounded-2xl text-sm font-black border-none text-white">
            <button onclick="abrirGastos()" class="bg-slate-800 p-4 rounded-2xl text-rose-400 font-black text-[10px] tap uppercase">💸 Gastos</button>
        </div>

        <div id="lista-peds" class="space-y-5 mb-24"></div>
    </main>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let PEDS=[], GASTOS=[], BASES={};

        const fmt = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        db.ref('fresas_niza/pedidos').on('value', s => { PEDS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/gastos').on('value', s => { GASTOS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; cargarDatosDia(); });

        function cargarDatosDia() { 
            document.getElementById('base-caja').value = BASES[document.getElementById('fecha-app').value] || 0; 
            dibujarTodo(); 
        }

        function guardarBase() { 
            db.ref('fresas_niza/bases/' + document.getElementById('fecha-app').value).set(parseInt(document.getElementById('base-caja').value) || 0); 
            dibujarTodo();
        }

        function dibujarTodo() {
            const fS = document.getElementById('fecha-app').value;
            const vP = document.getElementById('lista-peds');
            vP.innerHTML = '';
            
            let vPagadasHoy=0, gHoy=0, tVasos=0, cEntregados=0, cPendientes=0;

            PEDS.filter(p => p.fecha == fS).reverse().forEach(p => {
                if(p.pagado) vPagadasHoy += Number(p.total);
                
                const cant = parseInt(p.cant) || 1;
                tVasos += cant; // Suma al total general de vasos

                if(p.entregado) cEntregados += cant;
                else cPendientes += cant;

                vP.innerHTML += `
                <div class="card-p" style="border-left-color:${p.pagado ? '#10b981' : (p.entregado ? '#6366f1' : '#f43f5e')}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-black text-lg uppercase text-white">${p.cliente}</p>
                            <p class="text-xs font-bold text-slate-500 mt-1">${p.entrega} • Cant: ${cant} vasos</p>
                        </div>
                        <p class="font-black text-2xl text-emerald-400">$${fmt(p.total)}</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" 
                            class="flex-1 py-5 rounded-3xl text-xs font-black uppercase tracking-widest ${p.entregado ? 'bg-indigo-900/40 text-indigo-400 border border-indigo-500/30' : 'bg-slate-700 text-slate-300 shadow-lg'}">
                            ${p.entregado ? 'LISTO ✅' : '🚚 DESPACHAR'}
                        </button>
                        ${!p.pagado ? `
                            <button onclick="abPago('${p.id}')" class="bg-emerald-600 px-10 rounded-3xl text-xs font-black uppercase text-white shadow-xl tap">COBRAR</button>
                        ` : `
                            <button onclick="confirm('¿Borrar?') && db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 px-6 rounded-3xl text-rose-500 text-xl font-bold">✕</button>
                        `}
                    </div>
                </div>`;
            });

            GASTOS.filter(g => g.fecha == fS).forEach(g => { gHoy += Number(g.val); });

            const baseActual = parseInt(document.getElementById('base-caja').value) || 0;
            document.getElementById('total-ventas').innerText = '$' + fmt(vPagadasHoy);
            document.getElementById('total-caja').innerText = '$' + fmt(baseActual + vPagadasHoy - gHoy);
            
            // ACTUALIZAR TABLERO DE PRODUCCIÓN
            document.getElementById('c-total').innerText = tVasos;
            document.getElementById('c-pend').innerText = cPendientes;
            document.getElementById('c-listo').innerText = cEntregados;
        }

        function abrirModPed(){ document.getElementById('m-ped').style.display='flex'; }
        function abPago(id){ document.getElementById('pago-id').value=id; document.getElementById('m-pago').style.display='flex'; }
        function pagoFin(m){ db.ref('fresas_niza/pedidos/'+document.getElementById('pago-id').value).update({pagado:true, metodo:m, entregado:true}).then(()=>cerrar()); }
        function abrirGastos(){ document.getElementById('m-gastos').style.display='flex'; }
        function abrirModConfig(){ document.getElementById('m-config').style.display='flex'; }
        function cerrar(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    </script>
</body>
</html>
