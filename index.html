<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA FRESAS V1</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.98); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .card-pedido { background: #1e293b; border-left: 4px solid #f43f5e; margin-bottom: 8px; padding: 10px; border-radius: 8px; }
        .btn-estado { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <header class="bg-rose-700 p-4 sticky top-0 z-40 shadow-xl">
        <h1 class="text-center font-black italic text-lg">🍓 NIZA FRESAS CONTROL</h1>
        <div class="grid grid-cols-3 gap-2 mt-3 text-center">
            <div class="bg-black/20 p-1 rounded">
                <p class="text-[8px] uppercase opacity-70">Por Cobrar</p>
                <p id="res-debe" class="text-xs font-bold text-red-400">$ 0</p>
            </div>
            <div class="bg-black/20 p-1 rounded">
                <p class="text-[8px] uppercase opacity-70">En Caja</p>
                <p id="res-pago" class="text-xs font-bold text-green-400">$ 0</p>
            </div>
            <div class="bg-black/20 p-1 rounded">
                <p class="text-[8px] uppercase opacity-70">Entregas</p>
                <p id="res-entregas" class="text-xs font-bold text-blue-300">0</p>
            </div>
        </div>
    </header>

    <main class="p-4">
        <div class="flex gap-2 mb-4">
            <button onclick="abrirModalPedido()" class="flex-1 bg-rose-600 p-3 rounded-xl font-black text-xs tap uppercase">+ Nuevo Pedido</button>
            <button onclick="abrirModalClientes()" class="bg-slate-800 px-4 rounded-xl text-lg tap">👤</button>
        </div>

        <h2 class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Pedidos de Hoy</h2>
        <div id="lista-pedidos">
            </div>
    </main>

    <div id="m-pedido" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-3xl border border-rose-500/30">
            <h2 class="text-rose-500 font-black mb-4">CREAR PEDIDO</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1">CLIENTE</label>
                    <select id="p-cliente" class="w-full bg-slate-800 p-3 rounded-xl text-white outline-none"></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1">VASO</label>
                        <select id="p-vaso" class="w-full bg-slate-800 p-3 rounded-xl text-white outline-none">
                            <option value="12oz">12 oz</option>
                            <option value="14oz">14 oz</option>
                            <option value="16oz" selected>16 oz</option>
                            <option value="18oz">18 oz</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1">CANTIDAD</label>
                        <input type="number" id="p-cant" value="1" class="w-full bg-slate-800 p-3 rounded-xl text-white outline-none">
                    </div>
                </div>
                <button onclick="guardarPedido()" class="w-full bg-green-600 py-4 rounded-2xl font-black tap mt-4">CONFIRMAR PEDIDO ✅</button>
                <button onclick="cerrarModales()" class="w-full text-slate-500 text-xs py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="m-clientes" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-3xl border border-blue-500/30 flex flex-col max-h-[80vh]">
            <h2 class="text-blue-400 font-black mb-4 uppercase">Mis Clientes</h2>
            <div class="space-y-2 mb-4">
                <input type="text" id="c-nombre" placeholder="Nombre del Cliente" class="w-full bg-slate-800 p-3 rounded-xl text-white outline-none">
                <input type="number" id="c-precio" placeholder="Precio Predeterminado" class="w-full bg-slate-800 p-3 rounded-xl text-white outline-none">
                <button onclick="guardarCliente()" class="w-full bg-blue-600 py-2 rounded-xl font-bold tap">+ Añadir Cliente</button>
            </div>
            <div id="lista-clientes-db" class="overflow-y-auto flex-1 space-y-1"></div>
            <button onclick="cerrarModales()" class="mt-4 text-slate-500 text-xs underline text-center">Cerrar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (Usando tu misma DB de Niza para conveniencia en una nueva rama)
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();

        let clientes = [];
        let pedidos = [];

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        function getColDate() {
            return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Bogota' });
        }

        // Sincronización
        db.ref('/fresas_niza/clientes').on('value', snap => {
            clientes = snap.val() ? Object.values(snap.val()) : [];
            actualizarSelectClientes();
            dibujarClientes();
        });

        db.ref('/fresas_niza/pedidos').on('value', snap => {
            pedidos = snap.val() ? Object.entries(snap.val()).map(([id, data]) => ({id, ...data})) : [];
            dibujarPedidos();
        });

        // Lógica Clientes
        function guardarCliente() {
            const n = document.getElementById('c-nombre').value;
            const p = document.getElementById('c-precio').value;
            if(n && p) {
                db.ref('/fresas_niza/clientes').push({ nombre: n, precio: parseInt(p) });
                document.getElementById('c-nombre').value = '';
                document.getElementById('c-precio').value = '';
            }
        }

        function dibujarClientes() {
            const div = document.getElementById('lista-clientes-db');
            div.innerHTML = '';
            clientes.forEach(c => {
                div.innerHTML += `<div class="bg-slate-800 p-2 rounded-lg flex justify-between text-xs">
                    <span>${c.nombre}</span>
                    <span class="text-blue-400 font-bold">$${f(c.precio)}</span>
                </div>`;
            });
        }

        function actualizarSelectClientes() {
            const sel = document.getElementById('p-cliente');
            sel.innerHTML = '<option value="">-- Seleccionar --</option>';
            clientes.forEach(c => {
                sel.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`;
            });
        }

        // Lógica Pedidos
        function guardarPedido() {
            const cliNom = document.getElementById('p-cliente').value;
            const vaso = document.getElementById('p-vaso').value;
            const cant = parseInt(document.getElementById('p-cant').value);
            const clienteObj = clientes.find(c => c.nombre === cliNom);

            if(cliNom && cant > 0) {
                const valorTotal = clienteObj.precio * cant;
                db.ref('/fresas_niza/pedidos').push({
                    cliente: cliNom,
                    vaso: vaso,
                    cant: cant,
                    total: valorTotal,
                    fecha: getColDate(),
                    entregado: false,
                    pagado: false,
                    metodo: 'Pendiente'
                });
                cerrarModales();
            } else { alert("Selecciona cliente y cantidad"); }
        }

        function dibujarPedidos() {
            const hoy = getColDate();
            const div = document.getElementById('lista-pedidos');
            div.innerHTML = '';
            let totalDebe = 0, totalPago = 0, entregas = 0;

            pedidos.filter(p => p.fecha === hoy).forEach(p => {
                if(p.pagado) totalPago += p.total; else totalDebe += p.total;
                if(p.entregado) entregas++;

                const bgEstado = p.entregado ? 'border-green-500' : 'border-rose-500';
                
                div.innerHTML += `
                    <div class="card-pedido" style="border-left-color: ${p.entregado ? '#22c55e' : '#f43f5e'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-sm">${p.cliente}</h3>
                                <p class="text-[10px] text-slate-400">${p.cant} vaso(s) de ${p.vaso}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-sm">$${f(p.total)}</p>
                                <p class="text-[8px] uppercase ${p.pagado ? 'text-green-400':'text-red-400'}">${p.pagado ? 'PAGADO ('+p.metodo+')':'DEBE'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="toggleEntrega('${p.id}', ${p.entregado})" class="btn-estado ${p.entregado ? 'bg-green-900 text-green-300':'bg-slate-700 text-white'} tap">
                                ${p.entregado ? '✅ Entregado' : '🚚 Entregar'}
                            </button>
                            ${!p.pagado ? `
                                <button onclick="cobrarPedido('${p.id}')" class="btn-estado bg-amber-600 text-white tap">💰 Cobrar</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            document.getElementById('res-debe').innerText = "$ " + f(totalDebe);
            document.getElementById('res-pago').innerText = "$ " + f(totalPago);
            document.getElementById('res-entregas').innerText = entregas;
        }

        function toggleEntrega(id, estado) {
            db.ref('/fresas_niza/pedidos/' + id).update({ entregado: !estado });
        }

        function cobrarPedido(id) {
            const met = confirm("¿Fue Transferencia? (Aceptar para Transf, Cancelar para Efectivo)");
            const modo = met ? "Transferencia" : "Efectivo";
            db.ref('/fresas_niza/pedidos/' + id).update({ pagado: true, metodo: modo });
        }

        // UI Modales
        function abrirModalPedido() { document.getElementById('m-pedido').style.display = 'flex'; }
        function abrirModalClientes() { document.getElementById('m-clientes').style.display = 'flex'; dibujarClientes(); }
        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
