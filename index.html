<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA FRESAS PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans pb-10">

    <header class="bg-rose-700 p-4 sticky top-0 z-50 shadow-xl">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-lg">🍓 NIZA FRESAS PRO</h1>
            <button onclick="abrirModalClientes()" class="bg-white/20 px-3 py-2 rounded-xl text-xs font-bold tap">👤 CLIENTES</button>
        </div>
        
        <div class="grid grid-cols-3 gap-2 text-center text-white">
            <div class="bg-black/30 p-2 rounded-xl"><p class="text-[8px] uppercase font-bold opacity-70">Total Vasos</p><p id="prod-total" class="text-lg font-black">0</p></div>
            <div class="bg-black/30 p-2 rounded-xl"><p class="text-[8px] uppercase font-bold opacity-70">Entregados</p><p id="prod-entregado" class="text-lg font-black text-green-400">0</p></div>
            <div class="bg-black/30 p-2 rounded-xl"><p class="text-[8px] uppercase font-bold opacity-70">Faltan</p><p id="prod-falta" class="text-lg font-black text-rose-400">0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModalPedido()" class="w-full bg-rose-600 p-4 rounded-2xl font-black mb-6 shadow-lg tap uppercase">+ Nuevo Pedido</button>
        
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xs font-black text-slate-500 uppercase">Lista de Pedidos</h2>
            <input type="date" id="filtro-fecha" onchange="dibujarPedidos()" class="bg-slate-800 text-white p-2 rounded-lg border border-slate-700">
        </div>

        <div id="lista-pedidos" class="space-y-4 text-white">
            </div>
    </main>

    <script>
        // CONFIGURACIÓN CRÍTICA
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Referencia exacta a la carpeta de la base de datos
        const refClientes = db.ref('fresas_niza/clientes');
        const refPedidos = db.ref('fresas_niza/pedidos');

        let clientes = [];
        let pedidos = [];

        // CARGAR CLIENTES DESDE LA NUBE
        refClientes.on('value', snap => {
            const data = snap.val();
            clientes = data ? Object.entries(data).map(([id, d]) => ({id, ...d})) : [];
            actualizarSelectClientes();
            dibujarClientes();
            console.log("Clientes cargados:", clientes.length);
        }, error => {
            alert("Error de conexión: " + error.message);
        });

        // CARGAR PEDIDOS DESDE LA NUBE
        refPedidos.on('value', snap => {
            const data = snap.val();
            pedidos = data ? Object.entries(data).map(([id, d]) => ({id, ...d})) : [];
            dibujarPedidos();
            console.log("Pedidos cargados:", pedidos.length);
        });

        // [Funciones de dibujo y lógica de antes]
    </script>
</body>
</html>
