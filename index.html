<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA SISTEMA V9.1 - DETALLE PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 100px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; padding: 15px; overflow-y: auto; }
        input, select { background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 12px !important; color: white !important; padding: 10px; font-size: 12px; }
        .card-p { background: #1e293b; border-left: 10px solid #334155; border-radius: 25px; padding: 15px; margin-bottom: 10px; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: left; font-size: 9px; min-width: 80px; white-space: nowrap; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #1e293b; padding: 8px; border-radius: 10px; font-size: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-4 sticky top-0 z-40 rounded-b-[2.5rem] shadow-2xl border-b border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-rose-500 font-black italic text-lg uppercase">NIZA V9.1</h1>
            <div class="flex gap-1">
                <button onclick="abrir('m-reporte')" class="bg-blue-600 p-2 rounded-xl text-[8px] font-black uppercase">📊 Reporte Detallado</button>
                <button onclick="abrir('m-config')" class="bg-slate-700 p-2 rounded-xl text-[8px] font-black text-yellow-400 uppercase">⚙️ Ajustes</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-1 text-center mb-4 text-white">
            <div class="bg-slate-900 p-2 rounded-xl border border-blue-500/20"><p class="text-[6px] text-blue-400">BASE</p><input type="number" id="base-val" oninput="saveBase()" class="bg-transparent text-center w-full p-0 font-bold text-[10px] border-none"></div>
            <div class="bg-slate-900 p-2 rounded-xl border border-emerald-500/20"><p class="text-[6px] text-emerald-400 uppercase">Ventas</p><p id="dash-v" class="text-[10px] font-bold">$0</p></div>
            <div class="bg-slate-900 p-2 rounded-xl border border-rose-500/20"><p class="text-[6px] text-rose-400 uppercase">Gastos</p><p id="dash-g" class="text-[10px] font-bold">$0</p></div>
            <div class="bg-slate-900 p-2 rounded-xl border border-indigo-500/30"><p class="text-[6px] text-indigo-400 uppercase">Caja</p><p id="dash-c" class="text-[10px] font-bold">$0</p></div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-700/30 p-2 rounded-xl text-center"><p class="text-[7px] text-slate-400 uppercase font-black">Vasos</p><p id="cnt-t" class="text-lg font-black text-white">0</p></div>
            <div class="bg-emerald-500/10 p-2 rounded-xl text-center"><p class="text-[7px] text-emerald-400 uppercase font-black">Entregado</p><p id="cnt-e" class="text-lg font-black text-emerald-500">0</p></div>
            <div class="bg-rose-500/10 p-2 rounded-xl text-center"><p class="text-[7px] text-rose-400 uppercase font-black">Pendiente</p><p id="cnt-f" class="text-lg font-black text-rose-500">0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirVenta()" class="w-full bg-rose-600 p-6 rounded-[2.5rem] font-black text-lg shadow-xl mb-6 tap uppercase">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="dibujarTodo()" class="w-full mb-6 font-black text-center p-3 rounded-xl">
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-venta" class="modal">
        <div class="bg-slate-900 w-full max-w-lg p-6 rounded-[2.5rem] mx-auto border border-rose-500/20">
            <h2 class="text-rose-500 font-black text-center mb-4 uppercase">Armar Pedido</h2>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="v-cli"></select>
                    <select id="v-user"></select>
                </div>
                <select id="v-entrega" class="w-full text-yellow-400"></select>

                <div class="bg-slate-800 p-3 rounded-2xl">
                    <select id="v-vaso-sel" class="w-full mb-2 font-bold"></select>
                    <div id="v-tops-grid" class="grid grid-cols-2 gap-1 mb-3"></div>
                    <div class="flex gap-2">
                        <input type="number" id="v-cant" value="1" class="w-16 text-center font-bold">
                        <button onclick="addVasoCarrito()" class="flex-1 bg-indigo-600 p-2 rounded-xl font-black text-[10px] uppercase">+ Añadir Vaso</button>
                    </div>
                </div>

                <div id="v-carrito" class="space-y-1 max-h-32 overflow-y-auto"></div>

                <div class="grid grid-cols-2 gap-2 items-center">
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Descuento $</label>
                    <input type="number" id="v-desc" value="0" oninput="calcTotal()">
                </div>

                <div class="bg-slate-950 p-4 rounded-2xl text-center border border-emerald-500/20">
                    <p id="v-total-txt" class="text-3xl font-black text-emerald-400">$0</p>
                </div>

                <div class="flex gap-2">
                    <button onclick="confirmarVenta()" class="flex-1 bg-rose-600 py-4 rounded-xl font-black uppercase">Guardar Pedido</button>
                    <button onclick="cerrar()" class="bg-slate-700 px-6 rounded-xl font-bold">X</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-reporte" class="modal">
        <div class="bg-slate-900 w-full max-w-full p-4 rounded-[2rem] h-[95vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-blue-400 font-black uppercase text-xs">Cierre de Caja Detallado</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-[8px] font-black px-4 py-2 rounded-lg">DESCARGAR EXCEL</button>
            </div>
            <div class="overflow-auto flex-1 bg-slate-950 rounded-xl border border-slate-800">
                <table id="tabla-reporte" class="w-full">
                    <thead>
                        <tr class="bg-slate-800 text-slate-400 uppercase">
                            <th>Cliente</th><th>Atendió</th><th>Vaso</th><th>$ Vaso</th><th>Toppings</th><th>$ Tops</th><th>Cant</th><th>Desc</th><th>Total</th><th>Entrega</th><th>Pago</th>
                        </tr>
                    </thead>
                    <tbody id="tb-reporte"></tbody>
                </table>
            </div>
            <button onclick="cerrar()" class="mt-4 text-slate-500 font-bold uppercase text-[10px] text-center w-full">Regresar</button>
        </div>
    </div>

    <div id="m-pago-final" class="modal">
        <div class="bg-slate-900 w-full max-w-xs p-8 rounded-[3rem] mx-auto text-center border border-emerald-500/30">
            <input type="hidden" id="pago-id">
            <h3 class="text-emerald-400 font-black mb-6 uppercase text-sm">Método de Pago</h3>
            <div id="grid-pagos" class="space-y-3"></div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <div id="m-config" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] mx-auto h-[90vh] overflow-y-auto">
            <h2 class="text-yellow-500 font-black text-center mb-6 uppercase">Ajustes</h2>
            <div id="list-configs" class="space-y-4"></div>
            <button onclick="cerrar()" class="w-full mt-6 text-slate-500 font-bold uppercase text-xs">Cerrar</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let PEDS=[], CLIS=[], USERS=[], VASOS=[], TOPS=[], GASTOS=[], ENTS=[], PAGS=[], BASES={};
        let carrito = [];

        const bind = (path, cb) => db.ref('fresas_niza/'+path).on('value', s => cb(s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []));
        
        bind('pedidos', d => { PEDS = d; dibujarTodo(); });
        bind('clientes', d => { CLIS = d; dibUIs(); });
        bind('personal', d => { USERS = d; dibUIs(); });
        bind('config/vasos', d => { VASOS = d; dibUIs(); });
        bind('config/toppings', d => { TOPS = d; dibUIs(); });
        bind('config/entregas', d => { ENTS = d; dibUIs(); });
        bind('config/pagos', d => { PAGS = d; dibUIs(); });
        bind('gastos', d => { GASTOS = d; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; dibujarTodo(); });

        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        function dibujarTodo() {
            const f = document.getElementById('fecha-app').value;
            const lP = document.getElementById('lista-peds'), tR = document.getElementById('tb-reporte');
            lP.innerHTML = ''; tR.innerHTML = '';
            
            let vT=0, gT=0, totalV=0, entV=0, base = parseInt(BASES[f]) || 0;
            document.getElementById('base-val').value = base;

            PEDS.filter(p => p.fecha == f).reverse().forEach(p => {
                if(p.pagado) vT += parseInt(p.total);
                totalV += parseInt(p.cant_vasos || 0);
                if(p.entregado) entV += parseInt(p.cant_vasos || 0);

                lP.innerHTML += `<div class="card-p" style="border-color:${p.pagado?'#10b981':'#f43f5e'}">
                    <div class="flex justify-between"><div><b class="text-sm uppercase">${p.cliente}</b><br><small class="text-yellow-500 font-bold text-[9px] uppercase">${p.entrega || 'Local'}</small></div><b class="text-emerald-400 text-lg">$${p.total.toLocaleString()}</b></div>
                    <div class="text-[9px] text-slate-500 mt-2 italic">${p.resumen_txt}</div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 ${p.entregado?'bg-indigo-900/40 text-indigo-400':'bg-slate-700'} py-2 rounded-xl text-[9px] font-black uppercase">${p.entregado?'ENTREGADO ✅':'MARCAR ENTREGA'}</button>
                        ${!p.pagado ? `<button onclick="abPago('${p.id}')" class="flex-1 bg-emerald-600 py-2 rounded-xl font-black text-[9px] uppercase">COBRAR</button>` : `<button onclick="confirm('Borrar?') && db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 px-4 rounded-xl text-rose-500">✕</button>`}
                    </div>
                </div>`;

                // FILAS DEL REPORTE DETALLADO (Desglosado por el carrito guardado)
                if(p.carrito_json) {
                    p.carrito_json.forEach(item => {
                        tR.innerHTML += `<tr>
                            <td>${p.cliente}</td><td>${p.atendio}</td><td>${item.nombre}</td><td>$${item.pVaso}</td>
                            <td>${item.tops}</td><td>$${item.pTops}</td><td>${item.cant}</td><td>$${p.descuento || 0}</td>
                            <td>$${p.total}</td><td>${p.entrega}</td><td>${p.metodo_pago || 'PENDIENTE'}</td>
                        </tr>`;
                    });
                }
            });

            GASTOS.filter(g => g.fecha == f).forEach(g => gT += parseInt(g.val));
            document.getElementById('dash-v').innerText = '$' + vT.toLocaleString();
            document.getElementById('dash-g').innerText = '$' + gT.toLocaleString();
            document.getElementById('dash-c').innerText = '$' + (base + vT - gT).toLocaleString();
            document.getElementById('cnt-t').innerText = totalV;
            document.getElementById('cnt-e').innerText = entV;
            document.getElementById('cnt-f').innerText = totalV - entV;
        }

        function abrirVenta() {
            const sc=document.getElementById('v-cli'), su=document.getElementById('v-user'), se=document.getElementById('v-entrega'), sv=document.getElementById('v-vaso-sel'), gt=document.getElementById('v-tops-grid');
            sc.innerHTML = '<option value="">Seleccionar Cliente...</option>'; CLIS.forEach(c=>sc.innerHTML+=`<option value="${c.nombre}">${c.nombre}</option>`);
            su.innerHTML = '<option value="">Atiende...</option>'; USERS.forEach(u=>su.innerHTML+=`<option value="${u.nombre}">${u.nombre}</option>`);
            se.innerHTML = '<option value="LOCAL">Entrega: LOCAL</option>'; ENTS.forEach(e=>se.innerHTML+=`<option value="${e.nombre}">${e.nombre}</option>`);
            sv.innerHTML = '<option value="">Tipo de Vaso...</option>'; VASOS.forEach(v=>sv.innerHTML+=`<option value="${v.id}">${v.nombre} ($${v.precio})</option>`);
            gt.innerHTML = ''; TOPS.forEach(t=>gt.innerHTML+=`<label class="check-item"><input type="checkbox" value="${t.id}"> ${t.nombre}</label>`);
            carrito = []; dibujarCarrito(); calcTotal(); abrir('m-venta');
        }

        function addVasoCarrito() {
            const vId = document.getElementById('v-vaso-sel').value;
            const vaso = VASOS.find(v => v.id === vId);
            if(!vaso) return alert("Elige un vaso");
            
            const checks = document.querySelectorAll('#v-tops-grid input:checked');
            let tTxt = [], pTops = 0;
            checks.forEach(c => { let t=TOPS.find(x=>x.id===c.value); tTxt.push(t.nombre); pTops += parseInt(t.precio); });
            
            const cant = parseInt(document.getElementById('v-cant').value) || 1;
            carrito.push({
                nombre: vaso.nombre, pVaso: parseInt(vaso.precio),
                tops: tTxt.join(', ') || 'Sin Toppings', pTops: pTops,
                cant: cant, sub: (parseInt(vaso.precio) + pTops) * cant
            });
            document.getElementById('v-vaso-sel').value=''; checks.forEach(c=>c.checked=false);
            dibujarCarrito(); calcTotal();
        }

        function dibujarCarrito() {
            const d = document.getElementById('v-carrito'); d.innerHTML = '';
            carrito.forEach((v,i) => d.innerHTML += `<div class="bg-slate-800 p-2 rounded flex justify-between text-[9px] border-l-4 border-indigo-500"><span>${v.cant}x ${v.nombre} (${v.tops})</span><b>$${v.sub} <button onclick="carrito.splice(${i},1); dibujarCarrito(); calcTotal();">✕</button></b></div>`);
        }

        function calcTotal() {
            let total = carrito.reduce((a,b)=>a+b.sub, 0), desc = parseInt(document.getElementById('v-desc').value) || 0;
            document.getElementById('v-total-txt').innerText = '$' + (total-desc).toLocaleString();
            return (total-desc);
        }

        function confirmarVenta() {
            if(carrito.length===0 || !document.getElementById('v-cli').value) return alert("Faltan datos");
            db.ref('fresas_niza/pedidos').push({
                cliente: document.getElementById('v-cli').value, atendio: document.getElementById('v-user').value,
                entrega: document.getElementById('v-entrega').value,
                resumen_txt: carrito.map(c=>`${c.cant}x ${c.nombre} (${c.tops})`).join(' | '),
                carrito_json: carrito, // Guardamos el detalle para el reporte
                cant_vasos: carrito.reduce((a,b)=>a+b.cant, 0),
                descuento: document.getElementById('v-desc').value,
                total: calcTotal(), fecha: document.getElementById('fecha-app').value,
                pagado: false, entregado: false
            }).then(()=>cerrar());
        }

        function abPago(id) {
            document.getElementById('pago-id').value = id;
            const gP = document.getElementById('grid-pagos'); gP.innerHTML = '';
            PAGS.forEach(p => gP.innerHTML += `<button onclick="finalizarCobro('${p.nombre}')" class="w-full bg-slate-800 p-4 rounded-2xl font-black text-xs uppercase border border-emerald-500/30">${p.nombre}</button>`);
            abrir('m-pago-final');
        }

        function finalizarCobro(m) { db.ref('fresas_niza/pedidos/'+document.getElementById('pago-id').value).update({pagado:true, metodo_pago:m, entregado:true}).then(()=>cerrar()); }

        function saveBase() { db.ref('fresas_niza/bases/' + document.getElementById('fecha-app').value).set(document.getElementById('base-val').value); }
        function abrir(id) { document.getElementById(id).style.display = 'block'; }
        function cerrar() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function exportarExcel(){ const table=document.getElementById("tabla-reporte"), ws=XLSX.utils.table_to_sheet(table), wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Reporte"); XLSX.writeFile(wb, `Niza_Detalle_${document.getElementById('fecha-app').value}.xlsx`); }
        function dibUIs() { /* Mismo código de gestión de personal, vasos y toppings de la versión anterior */ }
    </script>
</body>
</html>
