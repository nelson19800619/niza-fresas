<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA SISTEMA V8.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 80px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; padding: 15px; overflow-y: auto; }
        input, select { background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 12px !important; color: white !important; padding: 12px; }
        .card-p { background: #1e293b; border-left: 10px solid #334155; border-radius: 25px; padding: 20px; margin-bottom: 12px; }
        .check-item { display: flex; align-items: center; gap: 10px; background: #334155; padding: 10px; border-radius: 10px; font-size: 11px; }
        .check-item input { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-5 sticky top-0 z-40 rounded-b-[2.5rem] shadow-2xl border-b border-slate-700">
        <div class="flex justify-between items-center mb-5">
            <h1 class="text-rose-500 font-black italic text-xl uppercase">🍓 NIZA V8.5</h1>
            <div class="flex gap-1">
                <button onclick="abrir('m-gastos')" class="bg-rose-600 p-2.5 rounded-xl text-[8px] font-black uppercase">💸 Gastos</button>
                <button onclick="abrir('m-config')" class="bg-slate-700 p-2.5 rounded-xl text-[8px] font-black text-yellow-400 uppercase">⚙️ Ajustes</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-1 text-center">
            <div class="bg-slate-900 p-2 rounded-xl border border-blue-500/20">
                <p class="text-[6px] text-blue-400 uppercase">Base</p>
                <input type="number" id="base-val" oninput="saveBase()" class="bg-transparent text-center w-full p-0 font-bold text-[10px] border-none !bg-transparent">
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-emerald-500/20">
                <p class="text-[6px] text-emerald-400 uppercase">Ventas</p>
                <p id="dash-v" class="text-[10px] font-bold">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-rose-500/20">
                <p class="text-[6px] text-rose-400 uppercase">Gastos</p>
                <p id="dash-g" class="text-[10px] font-bold">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-indigo-500/30">
                <p class="text-[6px] text-indigo-400 uppercase">Caja</p>
                <p id="dash-c" class="text-[10px] font-bold">$0</p>
            </div>
        </div>
    </header>

    <main class="p-6">
        <button onclick="abrirVenta()" class="w-full bg-rose-600 p-6 rounded-[2.5rem] font-black text-lg shadow-xl mb-6 tap uppercase">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="dibujarTodo()" class="w-full mb-6 font-bold text-center p-3 rounded-xl">
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-venta" class="modal">
        <div class="bg-slate-900 w-full max-w-lg p-6 rounded-[2.5rem] mx-auto border border-rose-500/20">
            <h2 class="text-rose-500 font-black text-center mb-4 uppercase">Nuevo Pedido</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <select id="v-cli" class="text-xs"></select>
                    <select id="v-user" class="text-xs"></select>
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl">
                    <p class="text-[10px] text-slate-400 mb-2 uppercase font-bold text-center">Armar Vaso</p>
                    <select id="v-vaso-sel" class="mb-2 text-xs"></select>
                    <div id="v-tops-grid" class="grid grid-cols-2 gap-2 mb-3"></div>
                    <div class="flex gap-2">
                        <input type="number" id="v-cant" value="1" class="w-20 text-center font-bold">
                        <button onclick="addVasoCarrito()" class="flex-1 bg-indigo-600 p-3 rounded-xl font-bold text-xs uppercase">+ Agregar Vaso</button>
                    </div>
                </div>

                <div id="v-carrito" class="space-y-2 max-h-32 overflow-y-auto"></div>

                <div class="flex gap-2 items-center">
                    <label class="text-xs text-slate-400">DESCUENTO $</label>
                    <input type="number" id="v-desc" value="0" oninput="calcTotal()" class="flex-1">
                </div>

                <div class="bg-slate-950 p-5 rounded-2xl text-center border-2 border-emerald-500/30">
                    <p class="text-[10px] text-slate-500 uppercase mb-1">Total a Pagar</p>
                    <p id="v-total-txt" class="text-4xl font-black text-emerald-400">$0</p>
                </div>

                <div class="flex gap-2">
                    <button onclick="confirmarVenta()" class="flex-1 bg-rose-600 py-4 rounded-xl font-black uppercase">Finalizar</button>
                    <button onclick="cerrar()" class="bg-slate-700 px-6 rounded-xl uppercase text-xs">X</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-gastos" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-[2.5rem] mx-auto border border-rose-500/20">
            <h2 class="text-rose-400 font-black text-center mb-4 uppercase">Gastos del Día</h2>
            <div class="space-y-2 mb-4">
                <input id="g-desc" placeholder="Descripción">
                <input id="g-val" type="number" placeholder="Valor $">
                <button onclick="addGasto()" class="w-full bg-rose-600 py-4 rounded-xl font-bold uppercase">Guardar Gasto</button>
            </div>
            <div id="l-gastos" class="space-y-2 max-h-60 overflow-y-auto"></div>
            <button onclick="cerrar()" class="w-full mt-4 text-slate-500 text-[10px] font-bold">CERRAR</button>
        </div>
    </div>

    <div id="m-config" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] mx-auto overflow-y-auto h-[90vh]">
            <h2 class="text-yellow-500 font-black text-center mb-6 uppercase">Ajustes del Sistema</h2>
            
            <div class="mb-6 bg-slate-800 p-4 rounded-2xl">
                <p class="text-indigo-400 font-black text-[10px] uppercase mb-2">Personal (Atención)</p>
                <input type="hidden" id="edit-u-id">
                <div class="flex gap-2 mb-2"><input id="u-n" placeholder="Nombre"><button id="btn-u" onclick="saveU()" class="bg-indigo-600 px-4 rounded-xl font-bold">+</button></div>
                <div id="l-u" class="space-y-1"></div>
            </div>

            <div class="mb-6 bg-slate-800 p-4 rounded-2xl">
                <p class="text-blue-400 font-black text-[10px] uppercase mb-2">Tipos de Vaso</p>
                <input type="hidden" id="edit-v-id">
                <div class="grid grid-cols-2 gap-2 mb-2"><input id="v-n" placeholder="Nombre"><input id="v-p" type="number" placeholder="Precio"></div>
                <button id="btn-v" onclick="saveV()" class="w-full bg-blue-600 py-2 rounded-xl font-bold uppercase text-[10px]">Guardar Vaso</button>
                <div id="l-v" class="mt-2 space-y-1"></div>
            </div>

            <div class="mb-6 bg-slate-800 p-4 rounded-2xl">
                <p class="text-emerald-400 font-black text-[10px] uppercase mb-2">Toppings</p>
                <input type="hidden" id="edit-t-id">
                <div class="grid grid-cols-2 gap-2 mb-2"><input id="t-n" placeholder="Nombre"><input id="t-p" type="number" placeholder="Precio"></div>
                <button id="btn-t" onclick="saveT()" class="w-full bg-emerald-600 py-2 rounded-xl font-bold uppercase text-[10px]">Guardar Topping</button>
                <div id="l-t" class="mt-2 space-y-1"></div>
            </div>

            <div class="bg-slate-800 p-4 rounded-2xl">
                <p class="text-rose-400 font-black text-[10px] uppercase mb-2">Clientes</p>
                <input type="hidden" id="edit-c-id">
                <div class="space-y-2 mb-2"><input id="c-n" placeholder="Nombre"><input id="c-d" placeholder="Dirección"><input id="c-t" placeholder="Tel"></div>
                <button id="btn-c" onclick="saveC()" class="w-full bg-rose-600 py-2 rounded-xl font-bold uppercase text-[10px]">Guardar Cliente</button>
                <div id="l-c" class="mt-2 space-y-1"></div>
            </div>

            <button onclick="cerrar()" class="w-full mt-6 text-slate-500 font-bold uppercase text-xs">Cerrar</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let PEDS=[], CLIS=[], USERS=[], VASOS=[], TOPS=[], GASTOS=[], BASES={};
        let carrito = [];

        const fbBind = (path, cb) => db.ref('fresas_niza/'+path).on('value', s => cb(s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []));
        
        fbBind('pedidos', d => { PEDS = d; dibujarTodo(); });
        fbBind('clientes', d => { CLIS = d; dibUIs(); });
        fbBind('personal', d => { USERS = d; dibUIs(); });
        fbBind('config/vasos', d => { VASOS = d; dibUIs(); });
        fbBind('config/toppings', d => { TOPS = d; dibUIs(); });
        fbBind('gastos', d => { GASTOS = d; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; dibujarTodo(); });

        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        // --- DASHBOARD Y DIBUJO ---
        function dibujarTodo() {
            const f = document.getElementById('fecha-app').value;
            const bR = document.getElementById('lista-peds'), lG = document.getElementById('l-gastos');
            bR.innerHTML = ''; lG.innerHTML = '';
            
            let vT=0, gT=0, base = parseInt(BASES[f]) || 0;
            document.getElementById('base-val').value = base;

            PEDS.filter(p => p.fecha == f).reverse().forEach(p => {
                if(p.pagado) vT += parseInt(p.total);
                bR.innerHTML += `<div class="card-p" style="border-color:${p.pagado?'#10b981':'#f43f5e'}">
                    <div class="flex justify-between"><b>${p.cliente}</b><b class="text-emerald-400">$${p.total.toLocaleString()}</b></div>
                    <div class="text-[9px] text-slate-500 mt-2">${p.resumen}</div>
                    <div class="flex gap-2 mt-4">
                        ${!p.pagado ? `<button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({pagado:true})" class="flex-1 bg-emerald-600 py-2 rounded-xl font-bold text-[10px] uppercase">Cobrar</button>` : `<button onclick="db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-700 px-4 rounded-xl text-rose-500 font-bold">✕</button>`}
                    </div>
                </div>`;
            });

            GASTOS.filter(g => g.fecha == f).forEach(g => {
                gT += parseInt(g.val);
                lG.innerHTML += `<div class="flex justify-between bg-slate-800 p-3 rounded-xl mb-1 text-xs"><span>${g.desc}</span><b class="text-rose-400">-$${g.val}</b><button onclick="db.ref('fresas_niza/gastos/${g.id}').remove()">✕</button></div>`;
            });

            document.getElementById('dash-v').innerText = '$' + vT.toLocaleString();
            document.getElementById('dash-g').innerText = '$' + gT.toLocaleString();
            document.getElementById('dash-c').innerText = '$' + (base + vT - gT).toLocaleString();
        }

        // --- VENTA MULTI-VASO ---
        function abrirVenta() {
            const sC = document.getElementById('v-cli'), sU = document.getElementById('v-user'), sV = document.getElementById('v-vaso-sel'), gT = document.getElementById('v-tops-grid');
            sC.innerHTML = '<option value="">Cliente...</option>'; CLIS.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => sC.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`);
            sU.innerHTML = '<option value="">Atiende...</option>'; USERS.forEach(u => sU.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            sV.innerHTML = '<option value="">Elegir Vaso...</option>'; VASOS.forEach(v => sV.innerHTML += `<option value="${v.id}">${v.nombre} ($${v.precio})</option>`);
            gT.innerHTML = ''; TOPS.forEach(t => gT.innerHTML += `<label class="check-item"><input type="checkbox" value="${t.id}"> ${t.nombre}</label>`);
            carrito = []; dibujarCarrito(); calcTotal(); abrir('m-venta');
        }

        function addVasoCarrito() {
            const vId = document.getElementById('v-vaso-sel').value;
            const vaso = VASOS.find(v => v.id === vId);
            if(!vaso) return alert("Selecciona un vaso");
            
            const checks = document.querySelectorAll('#v-tops-grid input:checked');
            let topsObj = [], topsTxt = [], pTops = 0;
            checks.forEach(c => {
                let t = TOPS.find(x => x.id === c.value);
                topsObj.push(t); topsTxt.push(t.nombre); pTops += parseInt(t.precio);
            });

            const cant = parseInt(document.getElementById('v-cant').value) || 1;
            carrito.push({
                nombre: vaso.nombre,
                precioUnit: parseInt(vaso.precio) + pTops,
                tops: topsTxt.join(','),
                cant: cant,
                subtotal: (parseInt(vaso.precio) + pTops) * cant
            });

            // Limpiar selección
            document.getElementById('v-vaso-sel').value = '';
            checks.forEach(c => c.checked = false);
            dibujarCarrito(); calcTotal();
        }

        function dibujarCarrito() {
            const div = document.getElementById('v-carrito');
            div.innerHTML = '';
            carrito.forEach((v, i) => {
                div.innerHTML += `<div class="bg-slate-800 p-2 rounded-lg flex justify-between text-[10px]">
                    <span>${v.cant}x ${v.nombre} (${v.tops})</span>
                    <b>$${v.subtotal} <button onclick="carrito.splice(${i},1); dibujarCarrito(); calcTotal();" class="text-rose-500 ml-2">✕</button></b>
                </div>`;
            });
        }

        function calcTotal() {
            let total = carrito.reduce((acc, item) => acc + item.subtotal, 0);
            let desc = parseInt(document.getElementById('v-desc').value) || 0;
            document.getElementById('v-total-txt').innerText = '$' + (total - desc).toLocaleString();
            return (total - desc);
        }

        function confirmarVenta() {
            if(carrito.length === 0 || !document.getElementById('v-cli').value) return alert("Faltan datos");
            const resumen = carrito.map(c => `${c.cant}x ${c.nombre} [${c.tops}]`).join(' | ');
            db.ref('fresas_niza/pedidos').push({
                cliente: document.getElementById('v-cli').value,
                atendio: document.getElementById('v-user').value,
                resumen: resumen,
                total: calcTotal(),
                fecha: document.getElementById('fecha-app').value,
                pagado: false
            }).then(() => cerrar());
        }

        // --- GASTOS ---
        function addGasto() {
            const d = document.getElementById('g-desc').value, v = parseInt(document.getElementById('g-val').value), f = document.getElementById('fecha-app').value;
            if(d && v) db.ref('fresas_niza/gastos').push({desc:d, val:v, fecha:f}).then(() => { document.getElementById('g-desc').value=''; document.getElementById('g-val').value=''; });
        }

        // --- CONFIGURACIÓN (CON EDICIÓN CORREGIDA) ---
        function dibUIs() {
            const list = (id, arr, fn) => {
                const el = document.getElementById(id); el.innerHTML = '';
                arr.forEach(item => el.innerHTML += `<div class="flex justify-between bg-slate-900 p-2 rounded-xl text-[10px] mb-1"><span>${item.nombre} ${item.precio?'($'+item.precio+')':''}</span><div class="flex gap-2"><button onclick="${fn}('${item.id}')" class="text-blue-400">✎</button><button onclick="confirm('¿Borrar?') && db.ref('fresas_niza/${fn.includes('U')?'personal':fn.includes('V')?'config/vasos':fn.includes('T')?'config/toppings':'clientes'}/${item.id}').remove()" class="text-rose-500">✕</button></div></div>`);
            };
            list('l-u', USERS, 'edU'); list('l-v', VASOS, 'edV'); list('l-t', TOPS, 'edT'); list('l-c', CLIS, 'edC');
        }

        // Funciones de guardado con edición
        function saveU() { const id = document.getElementById('edit-u-id').value, n = document.getElementById('u-n').value; if(!n) return; if(id) db.ref('fresas_niza/personal/'+id).update({nombre:n}); else db.ref('fresas_niza/personal').push({nombre:n}); document.getElementById('u-n').value=''; document.getElementById('edit-u-id').value=''; }
        function edU(id) { const x = USERS.find(u=>u.id===id); document.getElementById('u-n').value = x.nombre; document.getElementById('edit-u-id').value = id; }

        function saveV() { const id = document.getElementById('edit-v-id').value, n = document.getElementById('v-n').value, p = document.getElementById('v-p').value; if(!n) return; if(id) db.ref('fresas_niza/config/vasos/'+id).update({nombre:n, precio:p}); else db.ref('fresas_niza/config/vasos').push({nombre:n, precio:p}); document.getElementById('v-n').value=''; document.getElementById('v-p').value=''; document.getElementById('edit-v-id').value=''; }
        function edV(id) { const x = VASOS.find(v=>v.id===id); document.getElementById('v-n').value = x.nombre; document.getElementById('v-p').value = x.precio; document.getElementById('edit-v-id').value = id; }

        function saveT() { const id = document.getElementById('edit-t-id').value, n = document.getElementById('t-n').value, p = document.getElementById('t-p').value; if(!n) return; if(id) db.ref('fresas_niza/config/toppings/'+id).update({nombre:n, precio:p}); else db.ref('fresas_niza/config/toppings').push({nombre:n, precio:p}); document.getElementById('t-n').value=''; document.getElementById('t-p').value=''; document.getElementById('edit-t-id').value=''; }
        function edT(id) { const x = TOPS.find(t=>t.id===id); document.getElementById('t-n').value = x.nombre; document.getElementById('t-p').value = x.precio; document.getElementById('edit-t-id').value = id; }

        function saveC() { const id = document.getElementById('edit-c-id').value, n = document.getElementById('c-n').value, d = document.getElementById('c-d').value, t = document.getElementById('c-t').value; if(!n) return; if(id) db.ref('fresas_niza/clientes/'+id).update({nombre:n, direccion:d, tel:t}); else db.ref('fresas_niza/clientes').push({nombre:n, direccion:d, tel:t}); document.getElementById('c-n').value=''; document.getElementById('c-d').value=''; document.getElementById('c-t').value=''; document.getElementById('edit-c-id').value=''; }
        function edC(id) { const x = CLIS.find(c=>c.id===id); document.getElementById('c-n').value = x.nombre; document.getElementById('c-d').value = x.direccion; document.getElementById('c-t').value = x.tel; document.getElementById('edit-c-id').value = id; }

        function saveBase() { db.ref('fresas_niza/bases/' + document.getElementById('fecha-app').value).set(document.getElementById('base-val').value); }
        function abrir(id) { document.getElementById(id).style.display = 'block'; }
        function cerrar() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
