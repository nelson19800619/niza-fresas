<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA - CONTROL TOTAL V5.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 50px; }
        .card-p { background: #1e293b; border-left: 6px solid #334155; margin-bottom: 12px; padding: 15px; border-radius: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        input, select, textarea { color: white !important; background-color: #1e293b !important; outline: none; border: 1px solid #475569 !important; border-radius: 12px !important; }
        th, td { border: 1px solid #475569; padding: 8px; text-align: left; font-size: 9px; }
        th { background: #1e293b; color: #f8fafc; text-transform: uppercase; font-weight: 900; }
        .cli-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-4 sticky top-0 z-40 shadow-2xl rounded-b-[2rem] border-b border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <h1 class="font-black italic text-lg uppercase tracking-tighter text-rose-500">🍓 Delicias Niza</h1>
                <div class="flex gap-2 mt-1">
                    <span id="c-pend" class="text-[7px] font-bold bg-rose-500/20 text-rose-400 px-2 py-0.5 rounded-full border border-rose-500/30">PEND: 0</span>
                    <span id="c-listo" class="text-[7px] font-bold bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full border border-emerald-500/30">LISTO: 0</span>
                </div>
            </div>
            <div class="flex gap-1">
                <button onclick="abrirModReporte()" class="bg-blue-600 p-2 rounded-xl text-[8px] font-black text-white uppercase tap">📊 REPORTE</button>
                <button onclick="abrirModConfig()" class="bg-slate-700 p-2 rounded-xl text-[8px] font-bold text-yellow-200 uppercase tap">⚙️ CONFIG</button>
                <button onclick="abrirGastos()" class="bg-slate-700 p-2 rounded-xl text-[8px] font-bold text-rose-300 uppercase tap">💸 GASTOS</button>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-900 p-2 rounded-2xl text-center border border-blue-500/20">
                <p class="text-[7px] font-black text-blue-400 uppercase mb-1">Base Inicial</p>
                <input type="number" id="base-caja" oninput="guardarBase()" placeholder="0" class="bg-transparent text-center w-full font-black text-white text-sm border-none">
            </div>
            <div class="bg-slate-900 p-2 rounded-2xl text-center border border-emerald-500/20">
                <p class="text-[7px] font-black text-emerald-400 uppercase mb-1">Ventas Hoy</p>
                <p id="total-ventas" class="text-sm font-black text-white">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-2xl text-center border border-indigo-500/20">
                <p class="text-[7px] font-black text-indigo-400 uppercase mb-1">Caja Final</p>
                <p id="total-caja" class="text-sm font-black text-white">$0</p>
            </div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-5 rounded-3xl font-black text-base tap uppercase mb-6 shadow-lg border-b-4 border-rose-900 text-white tracking-widest">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="w-full bg-slate-800 p-3 rounded-xl text-xs font-bold border-none mb-4">
        <div id="lista-peds" class="space-y-4 mb-10"></div>
    </main>

    <div id="m-reporte" class="modal">
        <div class="bg-slate-900 w-full max-w-7xl p-6 rounded-[2.5rem] h-[90vh] flex flex-col border border-blue-500/30">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-blue-400 font-black uppercase text-sm">Auditoría General</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-[10px] font-black px-4 py-2 rounded-xl uppercase">📥 Excel</button>
            </div>
            <div class="overflow-auto flex-1 rounded-2xl border border-slate-700">
                <table id="tabla-reporte" class="w-full text-white min-w-[1000px]">
                    <thead>
                        <tr>
                            <th>CLIENTE</th><th>ENTREGA</th><th>ESTADO</th><th>VASOS</th><th>$ VASOS</th><th>$ TOPS</th><th>DESC</th><th>TOTAL</th><th>PAGO</th><th>ATENDIÓ</th>
                        </tr>
                    </thead>
                    <tbody id="body-reporte"></tbody>
                </table>
            </div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 font-black uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-ped" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] border border-rose-500/30 flex flex-col max-h-[95vh]">
            <h2 class="text-rose-500 font-black mb-4 text-center uppercase text-sm italic">Registrar Pedido</h2>
            <div class="space-y-3 overflow-y-auto flex-1 pr-1">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="p-fecha-venta" class="p-3 rounded-xl text-[10px] font-bold">
                    <select id="p-tipo-entrega" class="p-3 rounded-xl text-[10px] font-bold">
                        <option value="Domicilio">🛵 Domicilio</option>
                        <option value="Recoge">🚶 Recoge</option>
                    </select>
                </div>
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700 text-center">
                    <input type="text" id="filtro-cliente" oninput="actualizarSelects()" placeholder="🔍 Buscar Cliente..." class="w-full bg-transparent border-none text-xs mb-1 text-emerald-400 font-bold uppercase text-center">
                    <select id="p-cli" class="w-full p-3 rounded-xl font-bold text-[10px] uppercase border-t border-slate-700"></select>
                </div>
                <select id="p-atendio" class="w-full p-3 rounded-xl font-black text-yellow-500 text-xs uppercase"></select>
                <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700">
                    <select id="p-v" class="w-full p-3 rounded-xl font-bold text-xs mb-3 uppercase"></select>
                    <div id="grid-toppings" class="grid grid-cols-2 gap-2 mb-4"></div>
                    <button type="button" onclick="agregarAlCarrito()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-[10px] uppercase">✅ Añadir Vaso</button>
                </div>
                <div id="carrito-lista" class="space-y-2"></div>
                <input type="number" id="p-desc" value="0" oninput="dibujarCarrito()" placeholder="Descuento $" class="w-full p-3 rounded-xl font-black text-sm text-rose-400 text-center">
                <textarea id="p-nota" placeholder="Dirección o Notas..." class="w-full p-3 rounded-xl text-xs h-16"></textarea>
            </div>
            <div class="pt-4 border-t border-slate-700 mt-4">
                <div class="flex justify-between px-2 mb-2"><span class="text-slate-400 text-[10px] font-bold uppercase">Total Venta:</span><span id="total-carro" class="text-xl font-black text-emerald-400">$0</span></div>
                <button onclick="guardarP()" class="w-full bg-emerald-600 py-4 rounded-2xl font-black tap uppercase text-xs">Finalizar Venta</button>
                <button onclick="cerrar()" class="w-full text-slate-500 text-[10px] py-2 uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="m-config" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] h-[90vh] flex flex-col border border-yellow-500/30 text-center">
            <h2 id="titulo-config-cli" class="text-yellow-500 font-black mb-4 uppercase text-sm italic">Configuración</h2>
            <input type="hidden" id="edit-id-cli">
            <div class="bg-slate-800/50 p-4 rounded-3xl border border-slate-700 mb-4">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="c-n" placeholder="NOMBRE" class="p-2 text-[10px] uppercase">
                    <input type="number" id="c-t" placeholder="TELÉFONO" class="p-2 text-[10px]">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="text" id="c-b" placeholder="BARRIO" class="p-2 text-[10px] uppercase">
                    <input type="text" id="c-d" placeholder="DIRECCIÓN" class="p-2 text-[10px] uppercase">
                </div>
                <div class="flex gap-2">
                    <button id="btn-guardar-cli" onclick="guardarC()" class="flex-1 bg-blue-600 p-3 rounded-xl font-black text-[10px] uppercase">Guardar</button>
                    <button id="btn-cancelar-edit" onclick="limpiarFormCli()" class="hidden bg-slate-700 px-4 rounded-xl font-black text-[10px]">✕</button>
                </div>
            </div>
            <div id="l-cli" class="overflow-y-auto flex-1 space-y-1"></div>
            <button onclick="cerrar()" class="mt-4 bg-slate-800 py-3 rounded-2xl text-slate-400 font-bold uppercase text-[10px] w-full">Cerrar</button>
        </div>
    </div>

    <div id="m-gastos" class="modal"><div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] h-[80vh] flex flex-col"><h2 class="text-rose-400 font-black mb-4 uppercase text-center text-xs italic">Gastos</h2><div class="space-y-2 mb-4 bg-slate-800 p-4 rounded-2xl"><input type="text" id="g-desc" placeholder="Descripción" class="w-full p-3 text-xs"><input type="number" id="g-val" placeholder="Valor $" class="w-full p-3 text-xs font-black"><button onclick="guardarGasto()" class="w-full bg-rose-600 py-3 rounded-xl font-black text-xs uppercase">Añadir Gasto</button></div><div id="l-gastos" class="overflow-y-auto flex-1"></div><button onclick="cerrar()" class="mt-4 text-slate-500 text-[10px] uppercase font-bold">Cerrar</button></div></div>
    <div id="m-pago" class="modal"><div class="bg-slate-900 w-full max-w-xs p-8 rounded-[3rem] text-center text-white"><h3 class="text-emerald-400 font-black mb-8 uppercase text-xs">Registrar Pago</h3><input type="hidden" id="pago-id"><div class="space-y-4"><button onclick="pagoFin('Efectivo')" class="w-full bg-emerald-600 p-5 rounded-2xl font-black text-xs uppercase">💰 Efectivo</button><button onclick="pagoFin('Transferencia')" class="w-full bg-indigo-600 p-5 rounded-2xl font-black text-xs uppercase">📱 Transferencia</button><button onclick="cerrar()" class="w-full text-slate-500 font-bold mt-4 text-[10px]">Atrás</button></div></div></div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let CLIS=[], PEDS=[], GASTOS=[], BASES={}, TOPS=[], VASOS=[], USERS=[], CARRITO=[];

        const fmt = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        const aNombrePropio = (str) => str ? str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()) : '-';

        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-app').value = hoy;

        // CARGA DE DATOS
        db.ref('fresas_niza/clientes').on('value', s => { CLIS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; actualizarSelects(); dibujarConfigCLI(); });
        db.ref('fresas_niza/pedidos').on('value', s => { PEDS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/gastos').on('value', s => { GASTOS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; cargarDatosDia(); });
        db.ref('fresas_niza/toppings').on('value', s => { TOPS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarToppings(); });
        db.ref('fresas_niza/vasos').on('value', s => { VASOS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarVasos(); });
        db.ref('fresas_niza/personal').on('value', s => { USERS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; actualizarSelects(); });

        function cargarDatosDia() { 
            const f = document.getElementById('fecha-app').value;
            document.getElementById('base-caja').value = BASES[f] || 0; 
            dibujarTodo(); 
        }

        function guardarBase() { 
            const f = document.getElementById('fecha-app').value;
            const val = parseInt(document.getElementById('base-caja').value) || 0;
            db.ref('fresas_niza/bases/' + f).set(val); 
        }

        function dibujarTodo() {
            const fS = document.getElementById('fecha-app').value;
            const vP = document.getElementById('lista-peds'), bR = document.getElementById('body-reporte'), vG = document.getElementById('l-gastos');
            vP.innerHTML = ''; bR.innerHTML = ''; vG.innerHTML = '';
            
            let vHoy=0, gHoy=0, cEntregados=0, cPendientes=0;

            PEDS.filter(p => p.fecha == fS).reverse().forEach(p => {
                // Cálculo de Caja (Solo sumamos ventas PAGADAS)
                if(p.pagado) vHoy += Number(p.total);
                
                // Conteo de Vasos
                const cantVasos = parseInt(p.cant) || 1;
                if(p.entregado) cEntregados += cantVasos;
                else cPendientes += cantVasos;

                // Cartas Inicio
                vP.innerHTML += `<div class="card-p" style="border-left-color:${p.pagado ? '#10b981' : (p.entregado ? '#6366f1' : '#f43f5e')}">
                    <div class="flex justify-between mb-2"><div><p class="font-black text-xs uppercase">${p.cliente}</p><p class="text-[8px] font-bold text-slate-500">${p.entrega} | ${p.atendio}</p></div><p class="font-black text-lg">$${fmt(p.total)}</p></div>
                    <div class="flex gap-2">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 py-3 rounded-xl text-[8px] font-black ${p.entregado?'bg-indigo-900/40 text-indigo-400':'bg-slate-700 text-slate-400'}">${p.entregado?'LISTO ✅':'🚚 PENDIENTE'}</button>
                        ${!p.pagado ? `<button onclick="abPago('${p.id}')" class="bg-emerald-600 px-6 rounded-xl text-[8px] font-black uppercase">Cobrar</button>` : `<button onclick="confirm('¿Borrar?')&&db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 px-4 rounded-xl text-xs">✕</button>`}
                    </div>
                </div>`;

                // Tabla Reporte
                bR.innerHTML += `<tr>
                    <td>${aNombrePropio(p.cliente)}</td><td>${p.entrega}</td>
                    <td class="${p.entregado?'text-indigo-400':'text-rose-500'} font-bold">${p.entregado?'LISTO':'PEND'}</td>
                    <td class="text-center font-black">${cantVasos}</td>
                    <td>$${fmt(p.vVasos)}</td><td>$${fmt(p.vTops)}</td><td>$${fmt(p.descuento)}</td>
                    <td class="font-black text-emerald-400">$${fmt(p.total)}</td>
                    <td class="text-[7px] font-bold">${p.pagado ? p.metodo : 'DEBE'}</td><td>${p.atendio}</td>
                </tr>`;
            });

            // GASTOS
            GASTOS.filter(g => g.fecha == fS).forEach(g => { 
                gHoy += Number(g.val); 
                vG.innerHTML += `<div class="text-[10px] flex justify-between p-2 bg-slate-800 rounded mb-1 border-l-4 border-rose-500"><span>${g.desc}</span><span class="text-rose-400 font-bold">-$${fmt(g.val)}</span></div>`; 
            });

            // ACTUALIZAR DASHBOARD
            const baseActual = parseInt(document.getElementById('base-caja').value) || 0;
            document.getElementById('total-ventas').innerText = '$' + fmt(vHoy);
            document.getElementById('total-caja').innerText = '$' + fmt(baseActual + vHoy - gHoy);
            document.getElementById('c-pend').innerText = `PEND: ${cPendientes}`;
            document.getElementById('c-listo').innerText = `LISTO: ${cEntregados}`;
        }

        // --- LÓGICA DE VENTA ---
        function agregarAlCarrito() {
            const sV = document.getElementById('p-v'); if(!sV.value) return alert("Elige un vaso");
            let tNoms = [], tCost = 0;
            document.querySelectorAll('#grid-toppings input:checked').forEach(i => { tNoms.push(i.getAttribute('data-n')); tCost += parseInt(i.getAttribute('data-p')); i.checked = false; });
            const vPre = parseInt(sV.options[sV.selectedIndex].getAttribute('data-p'));
            CARRITO.push({ vaso: sV.value, pV: vPre, vT: tCost, toppings: tNoms, totalItem: vPre + tCost });
            dibujarCarrito();
        }

        function dibujarCarrito() {
            const lista = document.getElementById('carrito-lista'); let sub = 0; lista.innerHTML = '';
            CARRITO.forEach((item, index) => { sub += item.totalItem; lista.innerHTML += `<div class="bg-slate-800 p-2 rounded-xl flex justify-between items-center text-[10px]"><span>${item.vaso} (+${item.toppings.length})</span><button onclick="CARRITO.splice(${index},1); dibujarCarrito();" class="text-rose-500 px-2 font-black">✕</button></div>`; });
            document.getElementById('total-carro').innerText = '$' + fmt(sub - (parseInt(document.getElementById('p-desc').value) || 0));
        }

        function guardarP() {
            const ate = document.getElementById('p-atendio').value, cN = document.getElementById('p-cli').value, fV = document.getElementById('p-fecha-venta').value;
            if(!ate || !cN || CARRITO.length === 0) return alert("Faltan datos");
            const sumVasos = CARRITO.reduce((a, b) => a + b.pV, 0), sumTops = CARRITO.reduce((a, b) => a + b.vT, 0), desc = parseInt(document.getElementById('p-desc').value) || 0;
            const o = { cliente: cN, atendio: ate, entrega: document.getElementById('p-tipo-entrega').value, items: CARRITO, vVasos: sumVasos, vTops: sumTops, subtotal: sumVasos + sumTops, descuento: desc, total: (sumVasos + sumTops) - desc, cant: CARRITO.length, fecha: fV, nota: document.getElementById('p-nota').value, entregado: false, pagado: false, metodo: '' };
            db.ref('fresas_niza/pedidos').push(o).then(() => { CARRITO = []; cerrar(); });
        }

        // --- LÓGICA DE CLIENTES ---
        function prepararEdicion(id) {
            const c = CLIS.find(i => i.id === id); if(!c) return;
            document.getElementById('edit-id-cli').value = c.id;
            document.getElementById('c-n').value = c.nombre; document.getElementById('c-t').value = c.tel || '';
            document.getElementById('c-b').value = c.barrio || ''; document.getElementById('c-d').value = c.dir || '';
            document.getElementById('titulo-config-cli').innerText = "Editando Cliente";
            document.getElementById('btn-guardar-cli').innerText = "Actualizar";
            document.getElementById('btn-cancelar-edit').classList.remove('hidden');
        }

        function limpiarFormCli() {
            document.getElementById('edit-id-cli').value = '';
            document.getElementById('c-n').value = ''; document.getElementById('c-t').value = '';
            document.getElementById('c-b').value = ''; document.getElementById('c-d').value = '';
            document.getElementById('titulo-config-cli').innerText = "Configuración";
            document.getElementById('btn-guardar-cli').innerText = "Guardar";
            document.getElementById('btn-cancelar-edit').classList.add('hidden');
        }

        function guardarC(){
            const id=document.getElementById('edit-id-cli').value, n=document.getElementById('c-n').value.toUpperCase();
            if(!n) return alert("Nombre obligatorio");
            const data = { nombre:n, tel:document.getElementById('c-t').value, barrio:document.getElementById('c-b').value.toUpperCase(), dir:document.getElementById('c-d').value.toUpperCase() };
            if(id) db.ref('fresas_niza/clientes/'+id).update(data).then(()=>limpiarFormCli());
            else db.ref('fresas_niza/clientes').push(data).then(()=>limpiarFormCli());
        }

        function dibujarConfigCLI() {
            const l = document.getElementById('l-cli'); l.innerHTML = '';
            CLIS.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                l.innerHTML += `<div class="cli-item flex justify-between items-center"><div class="flex flex-col items-start"><span class="font-black text-[10px] text-white uppercase">${c.nombre}</span><span class="text-[8px] text-slate-400">${c.barrio||'S/B'}</span></div><div class="flex gap-2"><button onclick="prepararEdicion('${c.id}')" class="text-yellow-400 p-2">✏️</button><button onclick="confirm('¿Borrar?')&&db.ref('fresas_niza/clientes/${c.id}').remove()" class="text-rose-500 p-2">✕</button></div></div>`;
            });
        }

        // NAVEGACIÓN Y UTILS
        function abPago(id){ document.getElementById('pago-id').value=id; document.getElementById('m-pago').style.display='flex'; }
        function pagoFin(m){ db.ref('fresas_niza/pedidos/'+document.getElementById('pago-id').value).update({pagado:true, metodo:m, entregado:true}).then(()=>cerrar()); }
        function guardarGasto(){ const d=document.getElementById('g-desc').value,v=parseInt(document.getElementById('g-val').value),f=document.getElementById('fecha-app').value; if(d&&v) db.ref('fresas_niza/gastos').push({desc:d,val:v,fecha:f}).then(()=>{document.getElementById('g-desc').value='';document.getElementById('g-val').value='';}); }
        function cerrar(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
        function abrirModReporte() { document.getElementById('m-reporte').style.display='flex'; }
        function abrirModConfig(){ limpiarFormCli(); document.getElementById('m-config').style.display='flex'; }
        function abrirGastos(){ document.getElementById('m-gastos').style.display='flex'; }
        function abrirModPed(){ CARRITO=[]; document.getElementById('p-fecha-venta').value=document.getElementById('fecha-app').value; document.getElementById('p-desc').value=0; document.getElementById('p-nota').value=''; document.getElementById('filtro-cliente').value=''; actualizarSelects(); dibujarCarrito(); document.getElementById('m-ped').style.display='flex'; }
        function dibujarVasos(){ const sel=document.getElementById('p-v'); sel.innerHTML='<option value="">-- ELIGE VASO --</option>'; VASOS.forEach(v=>{ sel.innerHTML+=`<option value="${v.nombre}" data-p="${v.precio}">${v.nombre} ($${fmt(v.precio)})</option>`; }); }
        function dibujarToppings(){ const g=document.getElementById('grid-toppings'); g.innerHTML=''; TOPS.forEach(t=>{ g.innerHTML+=`<label class="flex items-center gap-1 bg-slate-700 p-1 rounded-lg text-[8px] uppercase"><input type="checkbox" data-p="${t.precio}" data-n="${t.nombre}"> ${t.nombre}</label>`; }); }
        function actualizarSelects(){ const s=document.getElementById('p-cli'), fil=document.getElementById('filtro-cliente').value.toLowerCase(); s.innerHTML='<option value="">-- SELECCIONAR CLIENTE --</option>'; CLIS.filter(c => !fil || c.nombre.toLowerCase().includes(fil)).sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c=>{ s.innerHTML+=`<option value="${c.nombre}">${c.nombre} (${c.barrio || 'S/B'})</option>`; }); const at=document.getElementById('p-atendio'); at.innerHTML='<option value="">-- QUIÉN ATIENDE --</option>'; USERS.forEach(u=>{ at.innerHTML+=`<option value="${u.nombre}">${u.nombre}</option>`; }); }
        function exportarExcel() { const table = document.getElementById("tabla-reporte"), ws = XLSX.utils.table_to_sheet(table); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Auditoria"); XLSX.writeFile(wb, `Niza_${document.getElementById('fecha-app').value}.xlsx`); }
    </script>
</body>
</html>
