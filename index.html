<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA - CONTROL TOTAL V5.9</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 60px; }
        .card-p { background: #1e293b; border-left: 12px solid #334155; margin-bottom: 15px; padding: 20px; border-radius: 28px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        input, select, textarea { color: white !important; background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 15px !important; outline: none; }
        th, td { border: 1px solid #475569; padding: 8px; text-align: left; font-size: 10px; }
        th { background: #1e293b; color: #f8fafc; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-5 sticky top-0 z-40 shadow-2xl rounded-b-[3rem] border-b border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-col">
                <h1 class="font-black italic text-xl uppercase tracking-tighter text-rose-500">🍓 Delicias Niza</h1>
                <span class="text-[9px] font-black opacity-50 text-slate-400 uppercase tracking-widest">Admin Mode V5.9</span>
            </div>
            <div class="flex gap-1.5">
                <button onclick="abrirModReporte()" class="bg-blue-600 p-2.5 rounded-xl text-[8px] font-black text-white uppercase tap">📊 Reporte</button>
                <button onclick="abrirModPersonal()" class="bg-indigo-600 p-2.5 rounded-xl text-[8px] font-black text-white uppercase tap">👥 Personal</button>
                <button onclick="abrirModConfig()" class="bg-slate-700 p-2.5 rounded-xl text-[8px] font-black text-yellow-200 uppercase tap">⚙️ Config</button>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-6 text-center">
            <div class="bg-slate-900 p-3 rounded-2xl border border-blue-500/20">
                <p class="text-[7px] font-black text-blue-400 uppercase mb-1">Base</p>
                <input type="number" id="base-caja" oninput="guardarBase()" class="bg-transparent text-center w-full font-black text-white text-sm border-none p-0">
            </div>
            <div class="bg-slate-900 p-3 rounded-2xl border border-emerald-500/20">
                <p class="text-[7px] font-black text-emerald-400 uppercase mb-1">Ventas Hoy</p>
                <p id="total-ventas" class="text-sm font-black text-white">$0</p>
            </div>
            <div class="bg-slate-900 p-3 rounded-2xl border border-indigo-500/20">
                <p class="text-[7px] font-black text-indigo-400 uppercase mb-1">Caja Final</p>
                <p id="total-caja" class="text-sm font-black text-white">$0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-700/30 p-3 rounded-2xl flex flex-col items-center border border-slate-600/30">
                <span class="text-[8px] font-black text-slate-400 uppercase mb-1">Total Pedidos</span>
                <span id="c-total" class="text-2xl font-black text-white">0</span>
            </div>
            <div class="bg-rose-500/20 p-3 rounded-2xl flex flex-col items-center border border-rose-500/40">
                <span class="text-[8px] font-black text-rose-400 uppercase mb-1">Faltan</span>
                <span id="c-pend" class="text-2xl font-black text-rose-500">0</span>
            </div>
            <div class="bg-emerald-500/20 p-3 rounded-2xl flex flex-col items-center border border-emerald-500/40">
                <span class="text-[8px] font-black text-emerald-400 uppercase mb-1">Entregados</span>
                <span id="c-listo" class="text-2xl font-black text-emerald-500">0</span>
            </div>
        </div>
    </header>

    <main class="p-6">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-7 rounded-[2.5rem] font-black text-xl tap uppercase mb-8 shadow-2xl border-b-8 border-rose-900 text-white tracking-widest">🚀 NUEVA VENTA</button>
        
        <div class="flex gap-3 items-center mb-6">
            <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="flex-1 bg-slate-800 p-5 rounded-2xl text-base font-black border-none text-white">
            <button onclick="abrirGastos()" class="bg-slate-800 p-5 rounded-2xl text-rose-400 font-black text-xs tap uppercase border border-rose-500/20">💸 Gastos</button>
        </div>

        <div id="lista-peds" class="space-y-5 mb-24"></div>
    </main>

    <div id="m-reporte" class="modal">
        <div class="bg-slate-900 w-full max-w-7xl p-6 rounded-[2.5rem] h-[90vh] flex flex-col border border-blue-500/30">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-blue-400 font-black uppercase text-xs">Auditoría de Ventas</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-[10px] font-black px-4 py-2 rounded-xl uppercase">📥 Descargar Excel</button>
            </div>
            <div class="overflow-auto flex-1 rounded-2xl border border-slate-700 bg-slate-950">
                <table id="tabla-reporte" class="w-full text-white min-w-[1000px]">
                    <thead>
                        <tr>
                            <th>CLIENTE</th><th>ENTREGA</th><th>ESTADO</th><th>VASOS</th><th>$ VASOS</th><th>$ TOPS</th><th>DESC</th><th>TOTAL</th><th>PAGO</th><th>ATENDIÓ</th>
                        </tr>
                    </thead>
                    <tbody id="body-reporte"></tbody>
                </table>
            </div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 font-black uppercase text-[10px] py-2">Cerrar Reporte</button>
        </div>
    </div>

    <div id="m-personal" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-[3rem] h-[80vh] flex flex-col border border-indigo-500/30">
            <h2 class="text-indigo-400 font-black mb-6 uppercase text-center text-sm">Gestionar Personal</h2>
            <div class="space-y-3 bg-slate-800 p-5 rounded-3xl mb-6">
                <input type="text" id="u-nombre" placeholder="Nombre del trabajador" class="w-full p-4 text-xs uppercase">
                <button onclick="guardarUser()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Agregar Miembro</button>
            </div>
            <div id="l-personal" class="overflow-y-auto flex-1 space-y-2"></div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 font-bold uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let PEDS=[], GASTOS=[], BASES={}, USERS=[];

        const fmt = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        db.ref('fresas_niza/pedidos').on('value', s => { PEDS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/gastos').on('value', s => { GASTOS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; cargarDatosDia(); });
        db.ref('fresas_niza/personal').on('value', s => { USERS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarUsers(); });

        function cargarDatosDia() { 
            const f = document.getElementById('fecha-app').value;
            document.getElementById('base-caja').value = BASES[f] || 0; 
            dibujarTodo(); 
        }

        function guardarBase() { 
            const f = document.getElementById('fecha-app').value;
            db.ref('fresas_niza/bases/' + f).set(parseInt(document.getElementById('base-caja').value) || 0); 
            dibujarTodo();
        }

        function dibujarTodo() {
            const fS = document.getElementById('fecha-app').value;
            const vP = document.getElementById('lista-peds'), bR = document.getElementById('body-reporte');
            vP.innerHTML = ''; bR.innerHTML = '';
            
            let vPagadasHoy=0, gHoy=0, tVasos=0, cEntregados=0, cPendientes=0;

            PEDS.filter(p => p.fecha == fS).reverse().forEach(p => {
                if(p.pagado) vPagadasHoy += Number(p.total);
                const cant = parseInt(p.cant) || 1;
                tVasos += cant;
                if(p.entregado) cEntregados += cant; else cPendientes += cant;

                // Cartas
                vP.innerHTML += `<div class="card-p" style="border-left-color:${p.pagado ? '#10b981' : (p.entregado ? '#6366f1' : '#f43f5e')}">
                    <div class="flex justify-between items-start mb-4">
                        <div><p class="font-black text-lg uppercase">${p.cliente}</p><p class="text-xs font-bold text-slate-500 mt-1">${p.entrega} • ${cant} vasos</p></div>
                        <p class="font-black text-2xl text-emerald-400">$${fmt(p.total)}</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 py-5 rounded-3xl text-[10px] font-black uppercase ${p.entregado ? 'bg-indigo-900/30 text-indigo-400' : 'bg-slate-700 text-slate-300 shadow-lg'}">${p.entregado ? 'LISTO ✅' : '🚚 DESPACHAR'}</button>
                        ${!p.pagado ? `<button onclick="abPago('${p.id}')" class="bg-emerald-600 px-10 rounded-3xl text-[10px] font-black uppercase text-white shadow-xl tap">COBRAR</button>` : `<button onclick="confirm('¿Borrar?') && db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 px-6 rounded-3xl text-rose-500 text-xl font-bold">✕</button>`}
                    </div>
                </div>`;

                // Tabla Reporte
                bR.innerHTML += `<tr>
                    <td class="font-bold">${p.cliente.toUpperCase()}</td><td>${p.entrega}</td>
                    <td class="${p.entregado?'text-indigo-400':'text-rose-500'} font-black">${p.entregado?'LISTO':'PEND'}</td>
                    <td class="text-center font-black">${cant}</td>
                    <td>$${fmt(p.vVasos)}</td><td>$${fmt(p.vTops)}</td><td>$${fmt(p.descuento)}</td>
                    <td class="font-black text-emerald-400">$${fmt(p.total)}</td>
                    <td class="font-bold">${p.pagado ? p.metodo.toUpperCase() : 'DEBE'}</td><td>${p.atendio.toUpperCase()}</td>
                </tr>`;
            });

            GASTOS.filter(g => g.fecha == fS).forEach(g => { gHoy += Number(g.val); });

            const baseActual = parseInt(document.getElementById('base-caja').value) || 0;
            document.getElementById('total-ventas').innerText = '$' + fmt(vPagadasHoy);
            document.getElementById('total-caja').innerText = '$' + fmt(baseActual + vPagadasHoy - gHoy);
            document.getElementById('c-total').innerText = tVasos;
            document.getElementById('c-pend').innerText = cPendientes;
            document.getElementById('c-listo').innerText = cEntregados;
        }

        function dibujarUsers() {
            const l = document.getElementById('l-personal'); l.innerHTML = '';
            USERS.forEach(u => { l.innerHTML += `<div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl"><span>${u.nombre.toUpperCase()}</span><button onclick="db.ref('fresas_niza/personal/${u.id}').remove()" class="text-rose-500 p-2 font-bold">✕</button></div>`; });
        }

        function guardarUser() { const n = document.getElementById('u-nombre').value.toUpperCase(); if(n) db.ref('fresas_niza/personal').push({nombre:n}).then(()=>document.getElementById('u-nombre').value=''); }
        function abrirModReporte(){ document.getElementById('m-reporte').style.display='flex'; }
        function abrirModPersonal(){ document.getElementById('m-personal').style.display='flex'; }
        function abrirModConfig(){ document.getElementById('m-config').style.display='flex'; }
        function abPago(id){ document.getElementById('pago-id').value=id; document.getElementById('m-pago').style.display='flex'; }
        function exportarExcel(){ const table = document.getElementById("tabla-reporte"), ws = XLSX.utils.table_to_sheet(table); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Niza"); XLSX.writeFile(wb, `Niza_${document.getElementById('fecha-app').value}.xlsx`); }
        function cerrar(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    </script>
</body>
</html>
