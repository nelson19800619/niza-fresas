<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA SISTEMA V9.3</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 100px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; padding: 15px; overflow-y: auto; }
        input, select { background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 12px !important; color: white !important; padding: 10px; font-size: 12px; }
        .card-p { background: #1e293b; border-left: 10px solid #334155; border-radius: 25px; padding: 15px; margin-bottom: 10px; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: left; font-size: 9px; min-width: 80px; white-space: nowrap; }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-4 sticky top-0 z-40 rounded-b-[2.5rem] shadow-2xl border-b border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-rose-500 font-black italic text-lg uppercase">NIZA V9.3</h1>
            <div class="flex gap-1">
                <button onclick="abrir('m-reporte')" class="bg-blue-600 p-2 rounded-xl text-[8px] font-black uppercase">📊 Reporte</button>
                <button onclick="abrir('m-gastos')" class="bg-rose-600 p-2 rounded-xl text-[8px] font-black uppercase">💸 Gastos</button>
                <button onclick="abrir('m-config')" class="bg-slate-700 p-2 rounded-xl text-[8px] font-black text-yellow-400 uppercase">⚙️ Ajustes</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-1 text-center mb-4">
            <div class="bg-slate-900 p-2 rounded-xl border border-blue-500/20"><p class="text-[6px] text-blue-400 uppercase font-black">Base</p><input type="number" id="base-val" oninput="saveBase()" class="bg-transparent text-center w-full p-0 font-bold text-[10px] !bg-transparent border-none"></div>
            <div class="bg-slate-900 p-2 rounded-xl border border-emerald-500/20"><p class="text-[6px] text-emerald-400 uppercase font-black">Ventas</p><p id="dash-v" class="text-[10px] font-bold text-white">$0</p></div>
            <div class="bg-slate-900 p-2 rounded-xl border border-rose-500/20"><p class="text-[6px] text-rose-400 uppercase font-black">Gastos</p><p id="dash-g" class="text-[10px] font-bold text-white">$0</p></div>
            <div class="bg-slate-900 p-2 rounded-xl border border-indigo-500/30"><p class="text-[6px] text-indigo-400 uppercase font-black">Caja</p><p id="dash-c" class="text-[10px] font-bold text-white">$0</p></div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-700/30 p-2 rounded-xl text-center"><p class="text-[7px] text-slate-400 uppercase font-black">Vasos</p><p id="cnt-t" class="text-lg font-black text-white">0</p></div>
            <div class="bg-emerald-500/10 p-2 rounded-xl text-center border border-emerald-500/20"><p class="text-[7px] text-emerald-400 uppercase font-black">Entregado</p><p id="cnt-e" class="text-lg font-black text-emerald-500">0</p></div>
            <div class="bg-rose-500/10 p-2 rounded-xl text-center border border-rose-500/20"><p class="text-[7px] text-rose-400 uppercase font-black">Pendiente</p><p id="cnt-f" class="text-lg font-black text-rose-500">0</p></div>
        </div>
    </header>

    <main class="p-4">
        <button onclick="abrirVenta()" class="w-full bg-rose-600 p-6 rounded-[2.5rem] font-black text-lg shadow-xl mb-6 tap uppercase">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="dibujarTodo()" class="w-full mb-6 font-black text-center p-3 rounded-xl border-none">
        <div id="lista-peds" class="space-y-4"></div>
    </main>

    <div id="m-reporte" class="modal">
        <div class="bg-slate-900 w-full max-w-full p-4 rounded-[2rem] h-[95vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-blue-400 font-black uppercase text-[10px]">Cierre Detallado</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-[8px] font-black px-4 py-2 rounded-lg uppercase">Excel</button>
            </div>
            <div class="overflow-auto flex-1 bg-slate-950 rounded-xl border border-slate-800">
                <table id="tabla-reporte" class="w-full">
                    <thead>
                        <tr class="bg-slate-800 text-slate-400 uppercase">
                            <th>CLIENTE</th><th>ATENDIÓ</th><th>VASO</th><th>$ VASO</th><th>TOPPINGS</th><th>$ TOPS</th><th>CANT</th><th>DESC</th><th>TOTAL FINAL</th><th>ENTREGA</th><th>PAGO</th>
                        </tr>
                    </thead>
                    <tbody id="tb-reporte"></tbody>
                </table>
            </div>
            <button onclick="cerrar()" class="mt-4 text-slate-500 text-[10px] uppercase font-bold text-center">Regresar</button>
        </div>
    </div>

    <div id="m-gastos" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2rem] mx-auto border border-rose-500/20">
            <h2 class="text-rose-400 font-black text-center mb-4 uppercase">Gastos</h2>
            <div class="space-y-2 mb-4">
                <input id="g-desc" placeholder="Descripción">
                <input id="g-val" type="number" placeholder="Valor $">
                <button onclick="addGasto()" class="w-full bg-rose-600 py-4 rounded-xl font-bold uppercase">Guardar</button>
            </div>
            <div id="l-gastos" class="space-y-1 max-h-48 overflow-y-auto"></div>
            <button onclick="cerrar()" class="w-full mt-4 text-slate-500 text-[10px] font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <div id="m-config" class="modal">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] mx-auto h-[90vh] overflow-y-auto border border-slate-700">
            <h2 class="text-yellow-500 font-black text-center mb-6 uppercase">Configuración</h2>
            <div class="space-y-4">
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <p class="text-indigo-400 font-black text-[9px] uppercase mb-2">Personal</p>
                    <input type="hidden" id="e-u-id"><div class="flex gap-1"><input id="u-n" placeholder="Nombre"><button onclick="saveU()" class="bg-indigo-600 px-3 rounded-lg">+</button></div>
                    <div id="l-u" class="mt-2 space-y-1"></div>
                </div>
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <p class="text-blue-400 font-black text-[9px] uppercase mb-2">Vasos</p>
                    <input type="hidden" id="e-v-id"><div class="grid grid-cols-2 gap-1 mb-1"><input id="v-n" placeholder="Nombre"><input id="v-p" type="number" placeholder="$"></div><button onclick="saveV()" class="w-full bg-blue-600 py-2 rounded-lg text-[9px] font-black uppercase">Guardar</button><div id="l-v" class="mt-2"></div>
                </div>
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <p class="text-emerald-400 font-black text-[9px] uppercase mb-2">Toppings</p>
                    <input type="hidden" id="e-t-id"><div class="grid grid-cols-2 gap-1 mb-1"><input id="t-n" placeholder="Nombre"><input id="t-p" type="number" placeholder="$"></div><button onclick="saveT()" class="w-full bg-emerald-600 py-2 rounded-lg text-[9px] font-black uppercase">Guardar</button><div id="l-t" class="mt-2"></div>
                </div>
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <p class="text-yellow-400 font-black text-[9px] uppercase mb-2">Entregas / Pagos</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="edEnt('')" class="bg-slate-700 p-2 rounded-lg text-[8px] font-black">+ Entrega</button>
                        <button onclick="edPag('')" class="bg-slate-700 p-2 rounded-lg text-[8px] font-black">+ Pago</button>
                    </div>
                    <div id="l-ent" class="mt-2"></div><div id="l-pag" class="mt-1 border-t border-slate-700 pt-1"></div>
                </div>
            </div>
            <button onclick="cerrar()" class="w-full mt-6 text-slate-500 font-bold uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-venta" class="modal">
        <div class="bg-slate-900 w-full max-w-lg p-6 rounded-[2.5rem] mx-auto border border-rose-500/20 shadow-2xl">
            <h2 class="text-rose-500 font-black text-center mb-4 uppercase">Nuevo Pedido</h2>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="v-cli" class="text-[10px]"></select>
                    <select id="v-user" class="text-[10px]"></select>
                </div>
                <select id="v-entrega" class="w-full text-yellow-400 font-bold text-[11px]"></select>
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <select id="v-vaso-sel" class="w-full mb-2 font-black uppercase"></select>
                    <div id="v-tops-grid" class="grid grid-cols-2 gap-1 mb-3"></div>
                    <div class="flex gap-2">
                        <input type="number" id="v-cant" value="1" class="w-16 text-center font-bold">
                        <button onclick="addVasoCarrito()" class="flex-1 bg-indigo-600 p-2 rounded-xl font-black text-[10px] uppercase">+ Vaso</button>
                    </div>
                </div>
                <div id="v-carrito" class="space-y-1 max-h-24 overflow-y-auto"></div>
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl">
                    <span class="text-[10px] font-black uppercase text-slate-500">Descuento $</span>
                    <input type="number" id="v-desc" value="0" oninput="calcTotal()" class="w-24 text-right">
                </div>
                <div class="bg-slate-950 p-4 rounded-2xl text-center border border-emerald-500/20">
                    <p id="v-total-txt" class="text-3xl font-black text-emerald-400">$0</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="confirmarVenta()" class="flex-1 bg-rose-600 py-4 rounded-xl font-black uppercase">Confirmar</button>
                    <button onclick="cerrar()" class="bg-slate-700 px-6 rounded-xl font-black uppercase">X</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-pago-final" class="modal">
        <div class="bg-slate-900 w-full max-w-xs p-8 rounded-[3rem] mx-auto text-center border border-emerald-500/30">
            <input type="hidden" id="pago-id">
            <h3 class="text-emerald-400 font-black mb-6 uppercase text-xs">Forma de Pago</h3>
            <div id="grid-pagos" class="space-y-3"></div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 text-[10px] uppercase font-black">Cancelar</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let PEDS=[], CLIS=[], USERS=[], VASOS=[], TOPS=[], GASTOS=[], ENTS=[], PAGS=[], BASES={};
        let carrito = [];

        const bind = (path, cb) => db.ref('fresas_niza/'+path).on('value', s => cb(s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []));
        
        bind('pedidos', d => { PEDS = d; dibujarTodo(); });
        bind('clientes', d => { CLIS = d; dibUIs(); });
        bind('personal', d => { USERS = d; dibUIs(); });
        bind('config/vasos', d => { VASOS = d; dibUIs(); });
        bind('config/toppings', d => { TOPS = d; dibUIs(); });
        bind('config/entregas', d => { ENTS = d; dibUIs(); });
        bind('config/pagos', d => { PAGS = d; dibUIs(); });
        bind('gastos', d => { GASTOS = d; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; dibujarTodo(); });

        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        function dibujarTodo() {
            const f = document.getElementById('fecha-app').value;
            const lP = document.getElementById('lista-peds'), lG = document.getElementById('l-gastos'), tR = document.getElementById('tb-reporte');
            lP.innerHTML = ''; lG.innerHTML = ''; tR.innerHTML = '';
            
            let vT=0, gT=0, totalV=0, entV=0, base = parseInt(BASES[f]) || 0;
            document.getElementById('base-val').value = base;

            PEDS.filter(p => p.fecha == f).reverse().forEach(p => {
                if(p.pagado) vT += parseInt(p.total);
                totalV += parseInt(p.cant_vasos || 0);
                if(p.entregado) entV += parseInt(p.cant_vasos || 0);

                lP.innerHTML += `<div class="card-p" style="border-color:${p.pagado?'#10b981':'#f43f5e'}">
                    <div class="flex justify-between"><div><b class="text-sm uppercase">${p.cliente}</b><br><small class="text-yellow-500 font-bold text-[9px] uppercase">${p.entrega || 'LOCAL'}</small></div><b class="text-emerald-400 text-lg">$${p.total.toLocaleString()}</b></div>
                    <div class="text-[9px] text-slate-500 mt-2 italic">${p.resumen_txt}</div>
                    <div class="flex gap
