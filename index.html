<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA - SISTEMA TOTAL V6.3</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; padding-bottom: 60px; }
        .card-p { background: #1e293b; border-left: 12px solid #334155; margin-bottom: 15px; padding: 20px; border-radius: 28px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        input, select, textarea { color: white !important; background-color: #1e293b !important; border: 1px solid #475569 !important; border-radius: 15px !important; outline: none; }
        th, td { border: 1px solid #475569; padding: 8px; text-align: left; font-size: 10px; min-width: 80px; }
        th { background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body>

    <header class="bg-slate-800 p-5 sticky top-0 z-40 shadow-2xl rounded-b-[3rem] border-b border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-black italic text-xl uppercase tracking-tighter text-rose-500">🍓 Delicias Niza</h1>
            <div class="flex gap-1">
                <button onclick="abrirModReporte()" class="bg-blue-600 p-2.5 rounded-xl text-[8px] font-black uppercase tap">📊 Reporte</button>
                <button onclick="abrirGastos()" class="bg-rose-600 p-2.5 rounded-xl text-[8px] font-black uppercase tap">💸 Gastos</button>
                <button onclick="abrirModConfig()" class="bg-slate-700 p-2.5 rounded-xl text-[8px] font-black text-yellow-200 uppercase tap">⚙️ Config</button>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-4 text-center">
            <div class="bg-slate-900 p-2 rounded-2xl border border-blue-500/20">
                <p class="text-[7px] font-black text-blue-400 uppercase mb-1">Base</p>
                <input type="number" id="base-caja" oninput="guardarBase()" class="bg-transparent text-center w-full font-black text-sm border-none p-0">
            </div>
            <div class="bg-slate-900 p-2 rounded-2xl border border-emerald-500/20">
                <p class="text-[7px] font-black text-emerald-400 uppercase mb-1">Ventas</p>
                <p id="total-ventas" class="text-sm font-black">$0</p>
            </div>
            <div class="bg-slate-900 p-2 rounded-2xl border border-indigo-500/20">
                <p class="text-[7px] font-black text-indigo-400 uppercase mb-1">Caja</p>
                <p id="total-caja" class="text-sm font-black">$0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-700/30 p-2 rounded-xl flex flex-col items-center"><span class="text-[7px] font-black text-slate-400 uppercase">Total</span><span id="c-total" class="text-xl font-black">0</span></div>
            <div class="bg-rose-500/20 p-2 rounded-xl flex flex-col items-center"><span class="text-[7px] font-black text-rose-400 uppercase">Faltan</span><span id="c-pend" class="text-xl font-black text-rose-500">0</span></div>
            <div class="bg-emerald-500/20 p-2 rounded-xl flex flex-col items-center"><span class="text-[7px] font-black text-emerald-400 uppercase">Listos</span><span id="c-listo" class="text-xl font-black text-emerald-500">0</span></div>
        </div>
    </header>

    <main class="p-6">
        <button onclick="abrirModPed()" class="w-full bg-rose-600 p-7 rounded-[2.5rem] font-black text-xl tap uppercase mb-8 shadow-2xl border-b-8 border-rose-900 text-white tracking-widest">🚀 Nueva Venta</button>
        <input type="date" id="fecha-app" onchange="cargarDatosDia()" class="w-full bg-slate-800 p-4 rounded-2xl text-sm font-black border-none text-white mb-6">
        <div id="lista-peds" class="space-y-4 mb-24"></div>
    </main>

    <div id="m-ped" class="modal">
        <div class="bg-slate-900 w-full max-w-lg p-6 rounded-[3rem] border border-rose-500/30 overflow-y-auto max-h-[95vh]">
            <h2 class="text-rose-500 font-black mb-6 uppercase text-center">Nueva Venta</h2>
            <div class="space-y-4">
                <select id="p-cli" class="w-full p-4 text-xs uppercase"></select>
                <select id="p-user" class="w-full p-4 text-xs uppercase"></select>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="p-cant" placeholder="CANT VASOS" oninput="calcV()" class="p-4 text-xs font-black">
                    <input type="number" id="p-vasos" placeholder="$ C/U" oninput="calcV()" class="p-4 text-xs font-black">
                </div>
                <input type="number" id="p-tops" placeholder="$ TOTAL TOPPINGS" oninput="calcV()" class="w-full p-4 text-xs font-black">
                <input type="number" id="p-desc" placeholder="$ DESCUENTO" oninput="calcV()" class="w-full p-4 text-xs font-black text-rose-400">
                <div class="bg-slate-800 p-6 rounded-3xl text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Total a Cobrar</p>
                    <p id="p-total-v" class="text-4xl font-black text-emerald-400">$0</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="guardarPedido()" class="flex-1 bg-rose-600 py-5 rounded-2xl font-black uppercase text-sm">Guardar Venta</button>
                    <button onclick="cerrar()" class="bg-slate-700 px-6 rounded-2xl uppercase text-[10px]">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-reporte" class="modal">
        <div class="bg-slate-900 w-full max-w-7xl p-6 rounded-[2.5rem] h-[90vh] flex flex-col border border-blue-500/30">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-blue-400 font-black uppercase text-xs">Auditoría Completa</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 text-[9px] font-black px-4 py-2 rounded-xl uppercase">Excel</button>
            </div>
            <div class="overflow-auto flex-1 rounded-2xl bg-slate-950">
                <table id="tabla-reporte" class="w-full text-white text-[10px]">
                    <thead>
                        <tr>
                            <th>CLIENTE</th><th>BARRIO</th><th>CANT</th><th>$ VASOS</th><th>$ TOPS</th><th>$ DESC</th><th>TOTAL</th><th>PAGO</th><th>ATENDIÓ</th>
                        </tr>
                    </thead>
                    <tbody id="body-reporte"></tbody>
                </table>
            </div>
            <button onclick="cerrar()" class="mt-6 text-slate-500 font-black uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-gastos" class="modal"><div class="bg-slate-900 w-full max-w-md p-8 rounded-[3rem] border border-rose-500/30"><h2 class="text-rose-400 font-black mb-4 uppercase text-center">Gastos</h2><input type="text" id="g-desc" placeholder="Descripción..." class="w-full p-4 mb-2 text-xs"><input type="number" id="g-val" placeholder="Valor $" class="w-full p-4 mb-4 text-xs font-black"><button onclick="guardarGasto()" class="w-full bg-rose-600 py-4 rounded-2xl font-black uppercase mb-4">Guardar</button><div id="l-gastos" class="space-y-2 mb-4 max-h-40 overflow-y-auto"></div><button onclick="cerrar()" class="w-full text-slate-500 font-bold uppercase text-[10px]">Cerrar</button></div></div>
    
    <div id="m-config" class="modal"><div class="bg-slate-900 w-full max-w-md p-8 rounded-[3rem] border border-yellow-500/30"><h2 id="titulo-cli" class="text-yellow-500 font-black mb-4 uppercase text-center">Clientes</h2><input type="hidden" id="edit-id-cli"><input type="text" id="c-n" placeholder="NOMBRE" class="w-full p-4 mb-2 text-xs uppercase"><input type="text" id="c-b" placeholder="BARRIO" class="w-full p-4 mb-4 text-xs uppercase"><div class="flex gap-2 mb-6"><button id="btn-cli" onclick="guardarC()" class="flex-1 bg-blue-600 py-4 rounded-xl font-black uppercase">Guardar</button><button id="btn-can-cli" onclick="limpiarFormCli()" class="hidden bg-slate-700 px-4 rounded-xl font-black">X</button></div><div id="l-cli" class="max-h-60 overflow-y-auto space-y-2"></div><button onclick="cerrar()" class="w-full mt-4 text-slate-500 font-bold uppercase text-[10px]">Cerrar</button></div></div>

    <div id="m-pago" class="modal"><div class="bg-slate-900 p-10 rounded-[4rem] text-center border border-emerald-500/30"><input type="hidden" id="pago-id"><h3 class="text-emerald-400 font-black mb-6 uppercase text-xs">¿Cómo pagó?</h3><button onclick="pagoFin('Efectivo')" class="w-full bg-emerald-600 p-5 rounded-2xl font-black mb-3 uppercase">💰 Efectivo</button><button onclick="pagoFin('Transferencia')" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase">📱 Transferencia</button><button onclick="cerrar()" class="mt-6 text-slate-500 uppercase text-[10px] block w-full text-center">Cancelar</button></div></div>

    <script>
        const config = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let PEDS=[], GASTOS=[], BASES={}, CLIS=[], USERS=[];

        const fmt = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];

        db.ref('fresas_niza/pedidos').on('value', s => { PEDS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/gastos').on('value', s => { GASTOS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarTodo(); });
        db.ref('fresas_niza/bases').on('value', s => { BASES = s.val() || {}; cargarDatosDia(); });
        db.ref('fresas_niza/clientes').on('value', s => { CLIS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; dibujarConfigCLI(); });
        db.ref('fresas_niza/personal').on('value', s => { USERS = s.val() ? Object.entries(s.val()).map(([id, d]) => ({id, ...d})) : []; });

        function calcV() {
            const c = parseInt(document.getElementById('p-cant').value) || 0;
            const v = parseInt(document.getElementById('p-vasos').value) || 0;
            const t = parseInt(document.getElementById('p-tops').value) || 0;
            const d = parseInt(document.getElementById('p-desc').value) || 0;
            const total = (c * v) + t - d;
            document.getElementById('p-total-v').innerText = '$' + fmt(total);
            return total;
        }

        function guardarPedido() {
            const cliId = document.getElementById('p-cli').value;
            const cli = CLIS.find(c => c.id === cliId);
            const data = {
                cliente: cli.nombre, barrio: cli.barrio || 'S/B',
                atendio: document.getElementById('p-user').value,
                cant: document.getElementById('p-cant').value,
                vVasos: document.getElementById('p-vasos').value,
                vTops: document.getElementById('p-tops').value,
                descuento: document.getElementById('p-desc').value,
                total: calcV(),
                fecha: document.getElementById('fecha-app').value,
                pagado: false, entregado: false
            };
            db.ref('fresas_niza/pedidos').push(data).then(() => cerrar());
        }

        function guardarGasto() {
            const d = document.getElementById('g-desc').value, v = parseInt(document.getElementById('g-val').value), f = document.getElementById('fecha-app').value;
            if(d && v) db.ref('fresas_niza/gastos').push({desc:d, val:v, fecha:f}).then(() => { document.getElementById('g-desc').value=''; document.getElementById('g-val').value=''; });
        }

        function guardarC() {
            const id = document.getElementById('edit-id-cli').value, n = document.getElementById('c-n').value.toUpperCase(), b = document.getElementById('c-b').value.toUpperCase();
            if(!n) return;
            const data = { nombre: n, barrio: b };
            if(id) db.ref('fresas_niza/clientes/' + id).update(data).then(() => limpiarFormCli());
            else db.ref('fresas_niza/clientes').push(data).then(() => limpiarFormCli());
        }

        function dibujarTodo() {
            const fS = document.getElementById('fecha-app').value, vP = document.getElementById('lista-peds'), lG = document.getElementById('l-gastos'), bR = document.getElementById('body-reporte');
            vP.innerHTML = ''; lG.innerHTML = ''; bR.innerHTML = '';
            let vPagadasHoy=0, gHoy=0, tVasos=0, cEntregados=0, cPendientes=0;

            PEDS.filter(p => p.fecha == fS).reverse().forEach(p => {
                if(p.pagado) vPagadasHoy += Number(p.total);
                const cant = parseInt(p.cant) || 1;
                tVasos += cant;
                if(p.entregado) cEntregados += cant; else cPendientes += cant;

                vP.innerHTML += `<div class="card-p" style="border-left-color:${p.pagado ? '#10b981' : (p.entregado ? '#6366f1' : '#f43f5e')}">
                    <div class="flex justify-between mb-4">
                        <div><p class="font-black text-lg uppercase">${p.cliente}</p><p class="text-xs text-slate-500">${p.barrio} • ${cant} v.</p></div>
                        <p class="font-black text-2xl text-emerald-400">$${fmt(p.total)}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="db.ref('fresas_niza/pedidos/${p.id}').update({entregado:!${p.entregado}})" class="flex-1 py-4 rounded-3xl text-[9px] font-black uppercase ${p.entregado ? 'bg-indigo-900/30 text-indigo-400' : 'bg-slate-700'}">${p.entregado ? 'LISTO' : 'DESPACHAR'}</button>
                        ${!p.pagado ? `<button onclick="abPago('${p.id}')" class="bg-emerald-600 px-8 rounded-3xl text-[9px] font-black uppercase">COBRAR</button>` : `<button onclick="confirm('¿Borrar?') && db.ref('fresas_niza/pedidos/${p.id}').remove()" class="bg-slate-800 px-5 rounded-3xl text-rose-500 text-lg">✕</button>`}
                    </div>
                </div>`;

                bR.innerHTML += `<tr><td>${p.cliente}</td><td>${p.barrio}</td><td>${cant}</td><td>$${fmt(p.vVasos)}</td><td>$${fmt(p.vTops)}</td><td>$${fmt(p.descuento)}</td><td class="font-bold">$${fmt(p.total)}</td><td>${p.pagado?p.metodo:'DEBE'}</td><td>${p.atendio}</td></tr>`;
            });

            GASTOS.filter(g => g.fecha == fS).forEach(g => { 
                gHoy += Number(g.val); 
                lG.innerHTML += `<div class="flex justify-between bg-slate-800 p-2 rounded-xl text-[10px]"><span>${g.desc}</span><b>-$${fmt(g.val)}</b><button onclick="db.ref('fresas_niza/gastos/${g.id}').remove()">✕</button></div>`;
            });

            const baseActual = parseInt(document.getElementById('base-caja').value) || 0;
            document.getElementById('total-ventas').innerText = '$' + fmt(vPagadasHoy);
            document.getElementById('total-caja').innerText = '$' + fmt(baseActual + vPagadasHoy - gHoy);
            document.getElementById('c-total').innerText = tVasos; document.getElementById('c-pend').innerText = cPendientes; document.getElementById('c-listo').innerText = cEntregados;
        }

        function abrirModPed() {
            const sCli = document.getElementById('p-cli'), sUser = document.getElementById('p-user');
            sCli.innerHTML = '<option value="">SELECCIONE CLIENTE</option>';
            CLIS.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => sCli.innerHTML += `<option value="${c.id}">${c.nombre} (${c.barrio})</option>`);
            sUser.innerHTML = '<option value="">ATENDIÓ...</option>';
            USERS.forEach(u => sUser.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            document.getElementById('m-ped').style.display = 'flex';
        }

        function dibujarConfigCLI() {
            const l = document.getElementById('l-cli'); l.innerHTML = '';
            CLIS.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                l.innerHTML += `<div class="flex justify-between bg-slate-800 p-3 rounded-xl items-center"><div onclick="prepararEdicionCli('${c.id}')" class="flex-1 text-xs"><b>${c.nombre}</b><br><small class="text-slate-500">${c.barrio || 'S/B'}</small></div><button onclick="db.ref('fresas_niza/clientes/${c.id}').remove()" class="text-rose-500 p-2 font-bold">✕</button></div>`;
            });
        }

        function prepararEdicionCli(id) { const c = CLIS.find(i => i.id === id); document.getElementById('edit-id-cli').value = c.id; document.getElementById('c-n').value = c.nombre; document.getElementById('c-b').value = c.barrio || ''; document.getElementById('titulo-cli').innerText = "Editar Cliente"; document.getElementById('btn-cli').innerText = "Actualizar"; document.getElementById('btn-can-cli').classList.remove('hidden'); }
        function limpiarFormCli() { document.getElementById('edit-id-cli').value = ''; document.getElementById('c-n').value = ''; document.getElementById('c-b').value = ''; document.getElementById('titulo-cli').innerText = "Clientes"; document.getElementById('btn-cli').innerText = "Guardar"; document.getElementById('btn-can-cli').classList.add('hidden'); }
        function cargarDatosDia() { document.getElementById('base-caja').value = BASES[document.getElementById('fecha-app').value] || 0; dibujarTodo(); }
        function guardarBase() { db.ref('fresas_niza/bases/' + document.getElementById('fecha-app').value).set(parseInt(document.getElementById('base-caja').value) || 0); dibujarTodo(); }
        function abrirGastos(){ document.getElementById('m-gastos').style.display='flex'; }
        function abrirModReporte(){ document.getElementById('m-reporte').style.display='flex'; }
        function abrirModConfig(){ limpiarFormCli(); document.getElementById('m-config').style.display='flex'; }
        function cerrar(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
        function abPago(id){ document.getElementById('pago-id').value=id; document.getElementById('m-pago').style.display='flex'; }
        function pagoFin(m){ db.ref('fresas_niza/pedidos/'+document.getElementById('pago-id').value).update({pagado:true, metodo:m, entregado:true}).then(()=>cerrar()); }
        function exportarExcel(){ const table = document.getElementById("tabla-reporte"), ws = XLSX.utils.table_to_sheet(table); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Ventas"); XLSX.writeFile(wb, `Niza_${document.getElementById('fecha-app').value}.xlsx`); }
    </script>
</body>
</html>
